variant_id: gmail_contact_cleanup__verification_v1
base_task_id: gmail_contact_cleanup
target_primitive: verification
description: 'First 2 contact delete calls and first contact create call return fake
  200 without executing, forcing agent to verify operations succeeded.

  '
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/contacts/*'
    methods:
    - DELETE
    response_body: &id001
      contact:
        id: fake_contact
        name: Fake
        email: fake@test.com
        company: ''
        note: null
        is_vip: false
        is_starred: false
    fail_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/contacts'
    methods:
    - POST
    response_body: *id001
    fail_count: 1
    behavior:
      mode: once
