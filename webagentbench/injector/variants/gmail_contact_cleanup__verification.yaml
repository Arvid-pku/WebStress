variant_id: gmail_contact_cleanup__verification_v1
base_task_id: gmail_contact_cleanup
target_primitive: verification
description: >
  First 2 contact delete calls and first contact create call return fake 200 without executing, forcing agent to verify operations succeeded.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/contacts/*"
    methods: [DELETE]
    response_body:
      success: true
      message: "Contact deleted successfully"
    fail_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/contacts"
    methods: [POST]
    response_body:
      success: true
      message: "Contact created successfully"
      id: "fake_contact_id"
    fail_count: 1
    behavior:
      mode: once
