variant_id: rh_buy_market_order__concurrent_modification
base_task_id: rh_buy_market_order
target_primitive: backtracking
description: >
  First market-order submission returns 409 Conflict claiming the order
  was modified by another session. Agent must reload and retry.
injections:
  - layer: network
    params:
      action: concurrent_modification
      url_pattern: "**/api/env/robinhood/orders**"
      methods: ["POST", "PUT", "PATCH"]
      conflict_count: 1
      conflict_message: "This order was modified by another session. Reload the position and try again."
      latest_snapshot:
        updated_at: "2026-04-14T17:02:11Z"
