variant_id: amazon_cart_optimization__grounding_v1
base_task_id: amazon_cart_optimization
target_primitive: grounding
description: >
  ARIA labels are scrambled and the first cart read returns stale data
  showing incorrect quantities. The agent must ground its understanding
  in the actual page content rather than cached data.
injections:
  - layer: client
    params:
      action: scramble_aria
      selector: "[aria-label]"
      behavior:
        mode: persistent
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/cart"
      stale_body:
        items:
          - id: stale_1
            product_id: stale
            product_name: "Unknown Product"
            quantity: 99
            unit_price: 0.01
        totals: {"subtotal": 0.99, "shipping": 0, "tax": 0.08, "discount": 0, "gift_card_applied": 0, "total": 1.07}
      stale_count: 1
