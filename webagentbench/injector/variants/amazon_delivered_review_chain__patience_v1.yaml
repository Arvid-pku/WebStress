variant_id: amazon_delivered_review_chain__patience_v1
base_task_id: amazon_delivered_review_chain
target_primitive: patience
description: >
  Order detail pages and review submission have 5-second delays.
  The agent must wait patiently for responses rather than abandoning
  or retrying prematurely.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/orders/*"
      action: delay
      methods: ["GET"]
      delay_ms: 5000
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products/*/reviews"
      action: delay
      methods: ["POST"]
      delay_ms: 5000
