variant_id: amazon_cart_optimization__misleading_success
base_task_id: amazon_cart_optimization
target_primitive: verification
description: >
  First cart quantity update returns 200 with a success toast, but the
  actual quantity is unchanged. Readback catches it.
injections:
  - layer: network
    params:
      action: misleading_success
      url_pattern: "**/api/env/amazon/cart/update**"
      methods: ["POST", "PUT", "PATCH"]
      fail_count: 1
      success_body:
        success: true
        message: "Cart updated"
        toast: "Quantity updated in your cart."
