variant_id: gmail_escalation_chain__verification_v1
base_task_id: gmail_escalation_chain
target_primitive: verification
description: >
  Silent fail on first escalation email send. Server returns fake success
  but email not sent. Agent must verify sent folder to detect failure and
  resend escalation to correct level.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/send"
    methods: ["POST"]
    response_body: {"success": true, "email": {"id": "fake_escalation", "subject": "Escalation"}}
    fail_count: 1
    behavior:
      mode: once
