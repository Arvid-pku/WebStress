variant_id: lms_update_discussion_post__discussion_correction_retry_v2
base_task_id: lms_update_discussion_post
target_primitive: backtracking
description: A transient LMS failure is followed by a correction notice, so the agent
  must revisit and redo the right step rather than committing to the first path.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/lms/discussions/*/posts/*'
    methods:
    - PUT
    error_count: 1
    error_status: 503
    error_message: Temporary LMS failure. Retry the request.
    behavior:
      mode: once
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_code: '{target.course_code}'
    type: discussion_post
    discussion_id: '{target.target_discussion_id}'
