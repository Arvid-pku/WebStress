variant_id: pp_lab_medication_loop__labs_list_stale_v1
base_task_id: pp_lab_medication_loop
target_primitive: verification
description: The first labs list response is stale and omits the relevant result. The agent must refresh or reopen the labs view before acting on the portal state.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/labs**'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
