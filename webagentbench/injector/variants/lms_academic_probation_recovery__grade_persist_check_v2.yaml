variant_id: lms_academic_probation_recovery__grade_persist_check_v2
base_task_id: lms_academic_probation_recovery
target_primitive: verification
description: The LMS presents an initially plausible state, then a later correction
  or refresh reveals the true outcome. The agent must verify persisted state before
  stopping.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/lms/messages/send'
    methods:
    - POST
    fail_count: 1
    response_body:
      message:
        to: advisor@school.edu
        subject: Question about next steps
        body: This looked sent, but the LMS did not persist it.
        sent_at: '2026-01-15T12:00:00+00:00'
        from: student@example.edu
      sent: false
    behavior:
      mode: once
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    type: announcement
