variant_id: booking_budget_comparison__tail_latency
base_task_id: booking_budget_comparison
target_primitive: patience
description: >
  Latency distribution mirrors real-world tails: p50 at 120ms, p95 at
  2.5s, p99 at 6s. Most requests feel fast; some feel genuinely slow.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/booking/**"
      behavior:
        mode: tail_latency
        p50_ms: 120
        p95_ms: 2500
        p99_ms: 6000
        seed: 91
