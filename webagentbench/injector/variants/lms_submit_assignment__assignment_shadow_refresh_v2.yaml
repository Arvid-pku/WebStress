variant_id: lms_submit_assignment__assignment_shadow_refresh_v2
base_task_id: lms_submit_assignment
target_primitive: grounding
description: Shadow assignment records plus a later correction compete for attention,
  so the agent must ground on the exact LMS target before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: assignment
      course_code: '{target.course_code}'
      title: '{target.assignment_title} practice copy'
      assignment_type: homework
      submission_status: not_submitted
    - type: assignment
      course_code: '{target.course_code}'
      title: '{target.assignment_title} archived version'
      assignment_type: homework
      submission_status: graded
      score: '88'
      feedback: This is an older graded copy.
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_code: '{target.course_code}'
    type: announcement
