variant_id: gmail_inbox_triage_protocol__state_tracking_v1
base_task_id: gmail_inbox_triage_protocol
target_primitive: state_tracking
description: High volume of topically relevant distractors makes tracking which emails
  need which actions harder
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 20
    topical_count: 12
    topical_subjects:
    - Project update - no action needed
    - 'FYI: Team sync notes'
    - 'Re: Question about priorities'
    - Meeting notes for reference
    - Weekly status update
    - 'Info: Policy change'
    - 'Newsletter: Industry news'
    - 'Auto-reply: Out of office'
    - 'CC: Team announcement'
    - 'FYI: Resource available'
    - 'Update: Project milestone reached'
    - 'Info: New documentation'
- layer: server
  params:
    action: scramble_timestamps
