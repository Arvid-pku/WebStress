variant_id: amazon_wishlist_stock_audit__verification_v1
base_task_id: amazon_wishlist_stock_audit
target_primitive: verification
description: >
  The first checkout attempt silently fails with a fake success response.
  The agent must verify that the order was actually placed and retry
  checkout if necessary.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: silent_fail
      methods: ["POST"]
      fail_count: 1
      response_body: {"order_id": "fake-order-001", "status": "confirmed", "message": "Order placed successfully"}
