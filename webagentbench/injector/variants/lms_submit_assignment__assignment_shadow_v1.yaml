variant_id: lms_submit_assignment__assignment_shadow_v1
base_task_id: lms_submit_assignment
target_primitive: grounding
description: Lookalike assignment records sit near the target, so the agent must match
  the exact LMS entity before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: assignment
      course_code: '{target.course_code}'
      title: '{target.assignment_title} practice copy'
      assignment_type: homework
      submission_status: not_submitted
    - type: assignment
      course_code: '{target.course_code}'
      title: '{target.assignment_title} archived version'
      assignment_type: homework
      submission_status: graded
      score: '88'
      feedback: This is an older graded copy.
