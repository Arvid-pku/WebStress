variant_id: amazon_search_and_buy__patience_v1
base_task_id: amazon_search_and_buy
target_primitive: patience
description: >
  API responses for product search and cart operations are progressively
  delayed, requiring the agent to wait patiently rather than assuming
  failure and retrying excessively.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products**"
      action: delay
      delay_ms: 500
      behavior:
        mode: progressive
        stages:
          - delay_ms: 500
          - delay_ms: 1000
          - delay_ms: 2000
          - delay_ms: 4000
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/**"
      action: delay
      delay_ms: 2000
