variant_id: pp_update_phone__profile_demographics_retry_v1
base_task_id: pp_update_phone
target_primitive: backtracking
description: The first demographics update fails transiently. The agent must retry and verify the profile actually changed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/profile/demographics'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary profile service failure. Retry the demographics update.
    behavior:
      mode: once
