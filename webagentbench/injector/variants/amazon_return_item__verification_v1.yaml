variant_id: amazon_return_item__verification_v1
base_task_id: amazon_return_item
target_primitive: verification
description: >
  The first return request silently fails (returns 200 but does not
  process the return). The agent must verify that the return was
  actually initiated by checking order/return status.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/returns"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
