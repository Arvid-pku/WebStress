variant_id: amazon_checkout_with_new_address__exploration_v1
base_task_id: amazon_checkout_with_new_address
target_primitive: exploration
description: >
  The first two address creation attempts silently fail, and three
  distractor addresses are pre-seeded. The agent must explore alternate
  paths and verify the address was actually saved.
injections:
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/addresses"
      stale_body:
        items:
          - id: addr_decoy_1
            full_name: "Sam Rivera"
            street_address: "999 Fake Blvd"
            city: "Nowhere"
            state: "XX"
            zip_code: "00000"
            country: "United States"
            is_default: false
            phone: ""
          - id: addr_decoy_2
            full_name: "S. Rivera"
            street_address: "100 Main St"
            city: "Springfield"
            state: "IL"
            zip_code: "62704"
            country: "United States"
            is_default: false
            phone: ""
      stale_count: 1
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/addresses"
      action: silent_fail
      fail_count: 2
      methods: ["POST"]
