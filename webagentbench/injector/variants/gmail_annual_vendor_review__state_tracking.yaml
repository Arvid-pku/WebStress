variant_id: gmail_annual_vendor_review__state_tracking_v1
base_task_id: gmail_annual_vendor_review
target_primitive: state_tracking
description: >
  Injects 12 topical distractor emails about vendors and scrambles timestamps to force agent to aggregate info across many vendor-related messages.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 77
- layer: seed
  params:
    action: increase_distractors
    count: 12
    topical_count: 12
    topical_subjects:
      - "Vendor portal access updated"
      - "Supplier diversity report"
      - "Vendor onboarding checklist"
      - "Procurement policy revision"
      - "Vendor payment schedule"
      - "Third-party risk assessment"
      - "Supplier code of conduct"
      - "Vendor performance metrics"
      - "Contract management system update"
      - "Vendor relationship best practices"
      - "Supplier sustainability initiative"
      - "Vendor audit requirements"
