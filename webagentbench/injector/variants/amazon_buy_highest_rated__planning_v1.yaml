variant_id: amazon_buy_highest_rated__planning_v1
base_task_id: amazon_buy_highest_rated
target_primitive: planning
description: >
  The first search returns empty results and product listing has a delay.
  The agent must re-plan its approach when the initial search yields
  nothing and subsequent requests are slow.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/search**"
      action: stale_data
      stale_body:
        items: []
        total: 0
        page: 1
        page_size: 25
        pages: 0
        query: ""
      stale_count: 1
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products**"
      action: delay
      delay_ms: 2000
