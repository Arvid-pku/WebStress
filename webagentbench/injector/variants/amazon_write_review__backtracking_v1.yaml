variant_id: amazon_write_review__backtracking_v1
base_task_id: amazon_write_review
target_primitive: backtracking
description: >
  The first two review submission attempts return 503 Service Unavailable.
  The agent must detect the failure, backtrack, and retry the review
  submission.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products/*/reviews"
      action: error_then_success
      error_status: 503
      error_count: 2
      methods: ["POST"]
