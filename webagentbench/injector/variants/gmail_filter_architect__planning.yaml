variant_id: gmail_filter_architect__planning_v1
base_task_id: gmail_filter_architect
target_primitive: planning
description: >
  Error on first label creation and first filter creation. Agent must replan:
  create labels first (with retry), then create filters that depend on those
  labels, in correct dependency order.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/labels"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/filters"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
