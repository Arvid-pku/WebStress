variant_id: pp_setup_telehealth__appointments_list_stale_v1
base_task_id: pp_setup_telehealth
target_primitive: verification
description: The first appointments list response is stale and omits the key schedule context. The agent must refresh the schedule before deciding which appointment to change.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/appointments**'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
