variant_id: amazon_multi_destination_orders__planning_v1
base_task_id: amazon_multi_destination_orders
target_primitive: planning
description: >
  Address creation returns a 503 error on the first attempt, and search
  returns empty results on the first query. The agent must re-plan its
  approach when initial requests fail.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/addresses"
      action: error_then_success
      methods: ["POST"]
      error_status: 503
      error_count: 1
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/search?*"
      action: stale_data
      methods: ["GET"]
      stale_count: 1
      stale_body:
        products: []
        total: 0
        page: 1
        page_size: 20
