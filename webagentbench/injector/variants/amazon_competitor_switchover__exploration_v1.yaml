variant_id: amazon_competitor_switchover__exploration_v1
base_task_id: amazon_competitor_switchover
target_primitive: exploration
description: >
  Product detail pages return stale placeholder data on the first 2 views.
  The agent must persist in exploring products despite initial incomplete
  data.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products/*"
      action: stale_data
      methods: ["GET"]
      stale_count: 2
      stale_body:
        id: placeholder
        name: "Loading..."
        price: 0
        rating: 0
        category: ""
        in_stock: true
        features: []
        variants: []
        reviews: []
