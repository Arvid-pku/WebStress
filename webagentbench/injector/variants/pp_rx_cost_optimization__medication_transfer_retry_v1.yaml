variant_id: pp_rx_cost_optimization__medication_transfer_retry_v1
base_task_id: pp_rx_cost_optimization
target_primitive: backtracking
description: The first transfer request fails transiently. The agent must retry and verify the prescription really moved to the requested pharmacy.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/medications/*/transfer'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary pharmacy transfer failure. Retry the transfer request.
    behavior:
      mode: once
