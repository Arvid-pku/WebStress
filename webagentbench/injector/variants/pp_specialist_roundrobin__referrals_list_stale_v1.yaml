variant_id: pp_specialist_roundrobin__referrals_list_stale_v1
base_task_id: pp_specialist_roundrobin
target_primitive: verification
description: The first referrals view is stale and temporarily hides the relevant approved or pending referral. The agent must refresh the referral state before using it.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/referrals**'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
