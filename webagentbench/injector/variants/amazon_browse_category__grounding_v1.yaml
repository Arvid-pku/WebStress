variant_id: amazon_browse_category__grounding_v1
base_task_id: amazon_browse_category
target_primitive: grounding
description: >
  ARIA labels are scrambled and the first product listing returns stale
  data with confusingly similar product names. The agent must carefully
  ground its selections in the actual page content.
injections:
  - layer: client
    params:
      action: scramble_aria
      selector: "[aria-label]"
      behavior:
        mode: persistent
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/products**"
      stale_body:
        items: []
        total: 0
        page: 1
        page_size: 25
        pages: 0
      stale_count: 1
