variant_id: pp_compare_lab_trends__lab_trend_stale_v1
base_task_id: pp_compare_lab_trends
target_primitive: verification
description: The first HbA1c trend fetch is stale and appears empty. The agent must verify the trend with a fresh read before scheduling follow-up care.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/labs/trend/*'
    stale_body:
      test_name: HbA1c
      items: []
    stale_count: 1
    behavior:
      mode: once
