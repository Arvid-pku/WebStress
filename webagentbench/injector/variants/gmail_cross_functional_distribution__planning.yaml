variant_id: gmail_cross_functional_distribution__planning_v1
base_task_id: gmail_cross_functional_distribution
target_primitive: planning
description: >
  First 2 forward attempts fail with 503 errors. Scrambled timestamps make
  temporal planning harder. Agent must replan distribution sequence and retry
  forwards in correct order despite failures.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/send"
    methods: ["POST"]
    error_status: 503
    error_count: 2
    behavior:
      mode: once
- layer: server
  params:
    action: scramble_timestamps
