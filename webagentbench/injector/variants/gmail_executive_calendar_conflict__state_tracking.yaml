variant_id: gmail_executive_calendar_conflict__state_tracking_v1
base_task_id: gmail_executive_calendar_conflict
target_primitive: state_tracking
description: >
  Inject 10 topical distractors about meetings, calendars, and scheduling.
  Scramble timestamps. Agent must track conflicting meeting requests, attendee
  availability, and resolution requirements across 15+ confusing emails.
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 10
    topical_count: 10
    topical_subjects:
      - "Meeting Room Availability"
      - "Calendar Update Notification"
      - "Scheduling Conflict Alert"
      - "Executive Availability"
      - "Meeting Request Follow-up"
      - "Calendar Sync Issues"
      - "Scheduling Priority Rules"
      - "Meeting Reschedule Request"
      - "Conflict Resolution Protocol"
      - "Calendar Coordinator Update"
- layer: server
  params:
    action: scramble_timestamps
