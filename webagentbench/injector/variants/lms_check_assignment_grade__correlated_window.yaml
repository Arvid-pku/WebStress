variant_id: lms_check_assignment_grade__correlated_window
base_task_id: lms_check_assignment_grade
target_primitive: patience
description: >
  A slow window starts at call 4 and lasts 5 calls (3s each). Before and
  after, everything is fast. Agent must not infer a permanent problem.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/lms/**"
      behavior:
        mode: correlated_window
        window_start_call: 4
        window_duration_calls: 5
        slow_ms: 3000
