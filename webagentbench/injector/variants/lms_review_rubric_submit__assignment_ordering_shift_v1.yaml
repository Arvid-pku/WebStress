variant_id: lms_review_rubric_submit__assignment_ordering_shift_v1
base_task_id: lms_review_rubric_submit
target_primitive: planning
description: Ordering cues are perturbed and the first snapshot can be incomplete,
  so the agent must re-plan against the current LMS state.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 42
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/grades/*'
    stale_body:
      assignment_id: '{target.target_assignment_id}'
      assignment_title: '{target.assignment_title}'
      score: null
      points_possible: '100'
      feedback: null
      submission_status: graded
      grade: null
    stale_count: 1
    behavior:
      mode: once
