variant_id: gmail_meeting_negotiation__state_tracking_v1
base_task_id: gmail_meeting_negotiation
target_primitive: state_tracking
description: Meeting preferences and constraints scattered across many threads with
  updates and conflicts
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 25
    topical_count: 15
    topical_subjects:
    - 'Re: Different meeting negotiation'
    - Calendar update - unrelated
    - Availability for past meeting
    - Meeting cancelled
    - Room booking conflict
    - Participant dropped out
    - Reschedule request - resolved
    - Meeting agenda update
    - Old negotiation thread
    - Participant availability changed
    - Meeting moved to different date
    - Conference room issues
    - Video call link problems
    - Timezone confusion resolved
    - Meeting notes from last time
- layer: seed
  params:
    action: add_contradictory_update
- layer: server
  params:
    action: scramble_timestamps
