variant_id: gmail_crisis_communication_draft__verification_v1
base_task_id: gmail_crisis_communication_draft
target_primitive: verification
description: >
  Silent fail on the first forward attempt (legal email) and first star attempt.
  Server returns fake success but actions don't execute. Agent must verify sent
  folder and starred status, then retry both operations.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/send"
    methods: ["POST"]
    response_body: {"success": true, "email": {"id": "fake_fwd", "subject": "Fwd: Legal"}}
    fail_count: 1
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/emails/*/star"
    methods: ["POST"]
    response_body: {"success": true}
    fail_count: 1
    behavior:
      mode: once
