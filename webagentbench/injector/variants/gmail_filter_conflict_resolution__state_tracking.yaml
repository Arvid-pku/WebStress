variant_id: gmail_filter_conflict_resolution__state_tracking_v1
base_task_id: gmail_filter_conflict_resolution
target_primitive: state_tracking
description: >
  Inject 6 additional filters with confusing criteria. Agent must track which
  filters conflict, which are valid, and maintain state of filter rules across
  12+ filter definitions.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
      - type: filter
        criteria: "from:notifications@test.com"
        action: "label:Updates"
        note: "Similar to actual filter"
      - type: filter
        criteria: "subject:Important"
        action: "label:Priority"
        note: "Overlaps with priority filter"
      - type: filter
        criteria: "from:alerts@test.com"
        action: "archive"
        note: "Conflicts with alerts filter"
      - type: filter
        criteria: "has:attachment"
        action: "label:Documents"
        note: "Broad criterion"
      - type: filter
        criteria: "from:team@test.com"
        action: "label:Team AND label:Work"
        note: "Multiple actions"
      - type: filter
        criteria: "subject:Report"
        action: "star"
        note: "Report-related"
