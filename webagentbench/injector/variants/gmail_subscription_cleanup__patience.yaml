variant_id: gmail_subscription_cleanup__patience_v1
base_task_id: gmail_subscription_cleanup
target_primitive: patience
description: Delete and filter operations return transient 503 errors requiring retry
  logic.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/emails/*/delete'
    error_status: 503
    error_count: 3
    behavior:
      mode: once
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/gmail/filters'
    error_status: 503
    error_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/gmail/search**'
    delay_ms: 2000
    behavior:
      mode: progressive
      stages:
      - call_number: 1
        delay_ms: 1000
      - call_number: 2
        delay_ms: 2000
      - call_number: 3
        delay_ms: 3000
