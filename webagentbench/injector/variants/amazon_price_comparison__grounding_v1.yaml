variant_id: amazon_price_comparison__grounding_v1
base_task_id: amazon_price_comparison
target_primitive: grounding
description: >
  ARIA labels are scrambled and the first product search returns stale
  data. The agent must carefully ground its price comparisons in the
  actual visible product data rather than cached results.
injections:
  - layer: client
    params:
      action: scramble_aria
      selector: "[aria-label]"
      behavior:
        mode: persistent
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/search**"
      stale_body:
        items: []
        total: 0
        page: 1
        page_size: 25
        pages: 0
        query: ""
      stale_count: 1
