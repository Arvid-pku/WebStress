variant_id: pp_dispute_claim__claim_appeal_retry_v1
base_task_id: pp_dispute_claim
target_primitive: backtracking
description: The first appeal submission fails transiently. The agent must retry and confirm the claim status actually changed to appealed.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/claims/*/appeal'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary claims service failure. Retry the appeal submission.
    behavior:
      mode: once
