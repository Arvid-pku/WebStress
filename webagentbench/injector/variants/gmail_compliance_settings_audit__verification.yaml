variant_id: gmail_compliance_settings_audit__verification_v1
base_task_id: gmail_compliance_settings_audit
target_primitive: verification
description: >
  First 2 settings update calls return fake 200 without applying changes, forcing agent to verify compliance settings were actually changed.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/settings"
    methods: [POST, PUT, PATCH]
    response_body:
      success: true
      message: "Settings updated successfully"
    fail_count: 2
    behavior:
      mode: once
