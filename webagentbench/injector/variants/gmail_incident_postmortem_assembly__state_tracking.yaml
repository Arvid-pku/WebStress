variant_id: gmail_incident_postmortem_assembly__state_tracking_v1
base_task_id: gmail_incident_postmortem_assembly
target_primitive: state_tracking
description: Incident details scattered across many threads with high topical noise
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 25
    topical_count: 15
    topical_subjects:
    - 'Re: Different incident postmortem'
    - Incident metrics Q1
    - Postmortem template v2
    - Previous outage analysis
    - Monitoring dashboard update
    - On-call handoff notes
    - SEV-2 from last month
    - Incident response improvements
    - 'RCA: Unrelated issue'
    - System architecture review
    - 'Re: Past incident discussion'
    - Performance degradation analysis
    - Action items from old postmortem
    - Infrastructure changes log
    - Team incident retrospective
- layer: server
  params:
    action: scramble_timestamps
