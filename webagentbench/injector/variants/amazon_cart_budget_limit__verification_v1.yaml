variant_id: amazon_cart_budget_limit__verification_v1
base_task_id: amazon_cart_budget_limit
target_primitive: verification
description: >
  The first checkout attempt silently fails (returns 200 but does not
  place the order). The agent must verify the order was placed and the
  budget constraint was respected.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
