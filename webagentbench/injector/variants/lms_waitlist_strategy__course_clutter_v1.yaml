variant_id: lms_waitlist_strategy__course_clutter_v1
base_task_id: lms_waitlist_strategy
target_primitive: exploration
description: Extra course noise expands the LMS search surface. The agent must keep
  exploring until it finds the real target.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: course
      course_code: COURSE-ALT
      title: COURSE Alternate Section
      status: enrolled
    - type: announcement
      title: COURSE registration note
      body: Archived enrollment reminder for a similar course code.
      priority: normal
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/courses'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
