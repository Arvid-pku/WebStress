variant_id: gmail_search_and_star__exploration_v2
base_task_id: gmail_search_and_star
target_primitive: exploration
description: The sidebar labels for "Inbox" and "Archive" are swapped, so clicking
  "Inbox" navigates to the archive view and vice versa. The first search also returns
  stale empty results. The agent must notice the mismatch and adapt its navigation
  strategy.
injections:
- layer: client
  params:
    action: swap_labels
    selector_a: a[aria-label="Inbox"]
    selector_b: a[aria-label="Archive"]
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/gmail/search**'
    stale_body:
      items: []
      total: 0
      page: 1
      page_size: 25
      pages: 1
      query: ''
    stale_count: 1
    behavior:
      mode: once
