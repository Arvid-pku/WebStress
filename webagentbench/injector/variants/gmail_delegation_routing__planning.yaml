variant_id: gmail_delegation_routing__planning_v1
base_task_id: gmail_delegation_routing
target_primitive: planning
description: >
  First forward attempt fails with 503. Scramble timestamps so delegation
  priority order is unclear. Agent must determine correct routing sequence
  and retry forward despite failure.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: "**/api/env/gmail/send"
    methods: ["POST"]
    error_status: 503
    error_count: 1
    behavior:
      mode: once
- layer: server
  params:
    action: scramble_timestamps
