variant_id: lms_peer_review_redo__peer_review_verify_v1
base_task_id: lms_peer_review_redo
target_primitive: verification
description: A key LMS read or write initially returns a misleading success or stale
  snapshot. The agent must verify the real persisted outcome.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/lms/peer-reviews/*/submit'
    methods:
    - POST
    fail_count: 1
    response_body:
      peer_review:
        id: review_fake
        assignment_id: assignment_fake
        reviewer_student_id: student_fake
        reviewee_student_id: peer_fake
        reviewee_name: Jordan Perez
        submission_title: Draft reflection
        submission_body: This response should not be treated as persisted.
        assignment_rubric: []
        rubric_scores: {}
        comments: ''
        status: submitted
        returned_for_revision: false
        previous_rubric_scores: {}
        previous_comments: ''
        due_at: '2026-01-15T12:00:00+00:00'
    behavior:
      mode: once
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: peer_review
      course_code: '{target.course_code}'
      assignment_id: null
      reviewee_name: Jordan Perez
      submission_title: Reflection submission draft
      submission_body: Near-match draft that is not the active review target.
      status: assigned
