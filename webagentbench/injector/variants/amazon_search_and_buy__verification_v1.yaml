variant_id: amazon_search_and_buy__verification_v1
base_task_id: amazon_search_and_buy
target_primitive: verification
description: >
  The first add-to-cart and checkout attempts silently fail (return 200
  but don't actually mutate state). The agent must verify that actions
  succeeded by checking the cart/order state.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/add"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
