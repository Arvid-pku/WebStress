variant_id: gmail_contact_audit__exploration_v2
base_task_id: gmail_contact_audit
target_primitive: exploration
description: The aria-labels for "Settings" and "Labels" in the sidebar manage section
  are swapped. Clicking the link that reads "Labels" navigates to Settings, and vice
  versa. The agent must notice the mismatch and adapt.
injections:
- layer: client
  params:
    action: scramble_aria
    selector: section[aria-label="manage"] a[aria-label]
