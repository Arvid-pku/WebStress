variant_id: lms_module_quiz_unlock__module_ordering_shift_v1
base_task_id: lms_module_quiz_unlock
target_primitive: planning
description: Ordering cues are perturbed and the first snapshot can be incomplete,
  so the agent must re-plan against the current LMS state.
injections:
- layer: server
  params:
    action: scramble_timestamps
    seed: 42
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/courses/*/modules'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
