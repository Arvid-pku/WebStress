variant_id: gmail_change_setting__verification_v1
base_task_id: gmail_change_setting
target_primitive: verification
description: 'First settings update call returns fake 200 but doesn''t apply the change,
  forcing agent to verify the setting was actually updated.

  '
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/settings'
    methods:
    - POST
    - PUT
    - PATCH
    response_body:
      settings:
        id: settings_gmail
        signature: ''
        forwarding_address: ''
        display_density: comfortable
        vacation_responder_enabled: false
        vacation_responder_message: ''
        auto_advance: newer
        language: English (US)
        input_tools_enabled: true
        right_to_left: false
        max_page_size: 50
        undo_send_seconds: 5
        default_reply_behavior: reply
        hover_actions_enabled: true
        send_and_archive: false
        default_text_style: Sans Serif
    fail_count: 1
    behavior:
      mode: once
