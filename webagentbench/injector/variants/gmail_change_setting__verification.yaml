variant_id: gmail_change_setting__verification_v1
base_task_id: gmail_change_setting
target_primitive: verification
description: >
  First settings update call returns fake 200 but doesn't apply the change, forcing agent to verify the setting was actually updated.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: "**/api/env/gmail/settings"
    methods: [POST, PUT, PATCH]
    response_body:
      success: true
      message: "Settings updated successfully"
    fail_count: 1
    behavior:
      mode: once
