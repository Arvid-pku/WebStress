variant_id: pp_refill_prescription__medication_refill_retry_v1
base_task_id: pp_refill_prescription
target_primitive: backtracking
description: The first refill request fails transiently. The agent must retry the refill instead of assuming the medication changed state.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/medications/*/refill'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary pharmacy service failure. Retry the refill request.
    behavior:
      mode: once
