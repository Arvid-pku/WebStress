variant_id: gmail_inbox_triage_protocol__verification_v1
base_task_id: gmail_inbox_triage_protocol
target_primitive: verification
description: Star and archive actions silently fail, requiring verification that actions
  took effect
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/emails/*/star'
    methods:
    - POST
    response_body:
      success: true
      message: Email starred successfully
    fail_count: 2
    behavior:
      mode: once
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/emails/*/archive'
    methods:
    - POST
    response_body:
      success: true
      message: Email archived successfully
    fail_count: 1
    behavior:
      mode: once
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - FYI email that looks urgent due to subject line
    - Newsletter with urgent-sounding subject
