variant_id: gmail_update_contact__verification
base_task_id: gmail_update_contact
target_primitive: verification
description: Silent contact update failures require checking that changes actually
  persisted
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/contacts'
    methods:
    - PUT
    - PATCH
    response_body:
      status: success
      contact_id: fake_contact_789
    fail_count: 2
    behavior:
      mode: once
      message: Contact update appeared successful but actually failed
- layer: server
  params:
    action: shuffle_contacts
- layer: seed
  params:
    action: increase_distractors
    count: 8
    topical_count: 4
    topical_subjects:
    - 'Re: Contact information update'
    - 'Fwd: New email address'
    - 'Thread: Contact details change'
    - 'Re: Updated contact info'
