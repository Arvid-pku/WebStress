variant_id: amazon_review_aggregation__patience_v1
base_task_id: amazon_review_aggregation
target_primitive: patience
description: >
  Review submission responses are progressively delayed, requiring the
  agent to wait patiently as it aggregates and submits reviews rather
  than assuming failures.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/amazon/products/*/reviews"
      delay_ms: 3000
      behavior:
        mode: progressive
        stages:
          - after_call: 0
            delay_ms: 500
          - after_call: 3
            delay_ms: 1500
          - after_call: 5
            delay_ms: 3000
