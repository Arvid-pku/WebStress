variant_id: gmail_action_item_extraction__intercepting_overlay
base_task_id: gmail_action_item_extraction
target_primitive: exploration
description: >
  A near-invisible overlay blocks clicks on the main content region. The
  overlay can be dismissed with Escape or by clicking a tiny corner button.
injections:
  - layer: client
    params:
      action: intercepting_overlay
      region: ".app-main, main, #root"
      opacity: 0.02
      behavior: { mode: persistent }
