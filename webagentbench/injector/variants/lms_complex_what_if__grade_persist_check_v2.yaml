variant_id: lms_complex_what_if__grade_persist_check_v2
base_task_id: lms_complex_what_if
target_primitive: verification
description: The LMS presents an initially plausible state, then a later correction
  or refresh reveals the true outcome. The agent must verify persisted state before
  stopping.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/lms/courses/*/grades/what-if'
    methods:
    - POST
    fail_count: 1
    response_body:
      assignment:
        id: '{target.highest_weight_ungraded_id}'
        course_id: '{target.target_course_id}'
        title: Assignment
        type: homework
        due_at: '2026-01-15T12:00:00+00:00'
        points_possible: '100'
        submission_status: submitted
        score: null
        feedback: null
        attempt_count: 1
        max_attempts: 3
        rubric: []
        weight_category: homework
        submitted_at: '2026-01-15T12:00:00+00:00'
        file_name: degraded.pdf
    behavior:
      mode: once
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_id: '{target.target_course_id}'
    type: announcement
