variant_id: amazon_add_new_address__exploration_v1
base_task_id: amazon_add_new_address
target_primitive: exploration
description: >
  The first two address creation attempts silently fail (return 200 but
  do not persist). The agent must explore alternative approaches and
  verify the address was actually saved.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/addresses"
      action: silent_fail
      fail_count: 2
      methods: ["POST"]
