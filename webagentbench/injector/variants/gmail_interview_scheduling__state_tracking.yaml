variant_id: gmail_interview_scheduling__state_tracking_v1
base_task_id: gmail_interview_scheduling
target_primitive: state_tracking
description: Availability scattered across many emails with scheduling conflicts and
  updates
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 20
    topical_count: 12
    topical_subjects:
    - 'Re: Interview for different candidate'
    - Calendar hold - cancelled
    - Availability update - outdated
    - Interview feedback from last week
    - Room booking confirmation
    - Interview guidelines update
    - Panel assignment change
    - Candidate pipeline review
    - Interview training materials
    - Old scheduling thread
    - Interviewer on-call schedule
    - Candidate withdrawn
- layer: seed
  params:
    action: add_contradictory_update
- layer: server
  params:
    action: scramble_timestamps
