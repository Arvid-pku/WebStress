variant_id: amazon_cancel_order__backtracking_v1
base_task_id: amazon_cancel_order
target_primitive: backtracking
description: >
  The first order cancellation attempt returns 503 Service Unavailable.
  The agent must detect the failure, backtrack, and retry the
  cancellation.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/orders**"
      action: error_then_success
      error_status: 503
      error_count: 1
      methods: ["POST"]
