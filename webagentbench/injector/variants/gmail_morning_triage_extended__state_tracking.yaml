variant_id: gmail_morning_triage_extended__state_tracking_v1
base_task_id: gmail_morning_triage_extended
target_primitive: state_tracking
description: High volume inbox with many actions to track across different categories
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 25
    topical_count: 15
    topical_subjects:
    - 'Re: Project question - FYI'
    - 'Newsletter: Weekly digest'
    - 'Auto-reply: Out of office'
    - 'CC: Team update'
    - 'Info: Resource available'
    - 'FYI: Meeting notes'
    - 'Update: Documentation published'
    - 'Announcement: Policy change'
    - 'Subscription: Industry news'
    - 'Notification: Calendar updated'
    - 'Re: Old thread resolved'
    - 'Forwarded: Info only'
    - 'Mailing list: Community discussion'
    - 'Auto: Build succeeded'
    - 'Status: All systems operational'
- layer: server
  params:
    action: scramble_timestamps
