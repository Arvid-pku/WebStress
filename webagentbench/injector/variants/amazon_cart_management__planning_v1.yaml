variant_id: amazon_cart_management__planning_v1
base_task_id: amazon_cart_management
target_primitive: planning
description: >
  The first search returns empty results and cart item deletion
  returns a 503 on the first attempt. The agent must re-plan its
  approach when initial assumptions break.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/search**"
      action: stale_data
      stale_body: {"items": [], "total": 0, "page": 1, "page_size": 25, "pages": 0, "query": ""}
      stale_count: 1
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/*"
      action: error_then_success
      error_status: 503
      error_count: 1
      methods: ["DELETE"]
