variant_id: lms_submit_late__grade_verify_v1
base_task_id: lms_submit_late
target_primitive: verification
description: A key LMS read or write initially returns a misleading success or stale
  snapshot. The agent must verify the real persisted outcome.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/lms/assignments/*/submit'
    methods:
    - POST
    fail_count: 1
    response_body:
      assignment:
        id: '{target.target_assignment_id}'
        course_id: '{target.target_course_id}'
        title: '{target.assignment_title}'
        type: homework
        due_at: '2026-01-15T12:00:00+00:00'
        points_possible: '100'
        submission_status: submitted
        score: null
        feedback: null
        attempt_count: 1
        max_attempts: 3
        rubric: []
        weight_category: homework
        submitted_at: '2026-01-15T12:00:00+00:00'
        file_name: degraded.pdf
    behavior:
      mode: once
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: assignment
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: '{target.assignment_title} practice copy'
      assignment_type: homework
      submission_status: not_submitted
    - type: assignment
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: '{target.assignment_title} archived version'
      assignment_type: homework
      submission_status: graded
      score: '88'
      feedback: This is an older graded copy.
