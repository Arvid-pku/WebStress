variant_id: lms_find_next_deadline__calendar_state_shadow_v1
base_task_id: lms_find_next_deadline
target_primitive: state_tracking
description: Additional LMS shadows split relevant state across similar entities.
  The agent must track the right object throughout the workflow.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: calendar_event
      title: Course event review session
      event_type: lecture
      location: Library 204
    - type: calendar_event
      title: Course event deadline reminder
      event_type: deadline
      location: LMS
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/calendar**'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
