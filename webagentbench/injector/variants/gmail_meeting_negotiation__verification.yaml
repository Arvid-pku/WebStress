variant_id: gmail_meeting_negotiation__verification_v1
base_task_id: gmail_meeting_negotiation
target_primitive: verification
description: Negotiation emails silently fail to send, requiring verification before
  proceeding to next step
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/send'
    methods:
    - POST
    response_body:
      success: true
      message: Email sent successfully
      email_id: fake-negotiation-id
    fail_count: 3
    behavior:
      mode: once
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - Agreement email that was later cancelled
    - Availability that expired
