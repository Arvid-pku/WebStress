variant_id: gmail_delegation_routing__grounding_v1
base_task_id: gmail_delegation_routing
target_primitive: grounding
description: >
  Add confusing decoy delegates with similar names and shuffle contacts list.
  Agent must correctly identify which delegate handles which type of email
  despite name/role confusion.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
      - type: contact
        name: "Sarah Johnson"
        email: "sjohnson@test.com"
        note: "Similar to Sara Johnston"
      - type: contact
        name: "Mike Anderson"
        email: "manderson@test.com"
        note: "Similar to Michael Andersen"
      - type: contact
        name: "Chris Martinez"
        email: "cmartinez@test.com"
        note: "Similar to Christine Martin"
- layer: server
  params:
    action: shuffle_contacts
