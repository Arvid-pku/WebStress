variant_id: gmail_thread_version_conflict__grounding
base_task_id: gmail_thread_version_conflict
target_primitive: grounding
description: Contradictory updates and confusing decoys stress identification of latest
  correct version
injections:
- layer: seed
  params:
    action: add_contradictory_update
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - This is the final version, ignore all others
    - Latest update attached - previous versions obsolete
    - Use v2.3 as the canonical reference
    - Disregard earlier versions, this supersedes all
    - 'Updated: see revised document in thread'
    - 'Correction: previous version had errors'
- layer: seed
  params:
    action: increase_distractors
    count: 12
    topical_count: 8
    topical_subjects:
    - 'Re: Version 1.0 draft'
    - 'Fwd: Updated v2 changes'
    - 'Thread: Latest revision'
    - 'Re: Final version review'
    - 'Fwd: Obsolete draft warning'
    - 'Re: Current version status'
    - 'Thread: Version history'
    - 'Re: Which version is correct?'
