variant_id: gmail_schedule_recovery__grounding_v1
base_task_id: gmail_schedule_recovery
target_primitive: grounding
description: Add contradictory schedule updates and aliases to force identification
  of ground truth.
injections:
- layer: seed
  params:
    action: add_contradictory_update
    contradictory_content:
    - type: email
      from: calendar-bot@company.com
      subject: Meeting Time Change - Design Review
      body: The design review has been moved to Thursday 2pm due to room conflict.
      timestamp: '2026-03-27T08:30:00Z'
      contradicts: Original design review scheduled for Wednesday 3pm
    - type: email
      from: sarah.chen@company.com
      subject: 'Re: Sprint Planning - Updated Time'
      body: Actually, let's keep sprint planning at the original time Monday 10am.
        Ignore my previous email about moving it.
      timestamp: '2026-03-28T15:45:00Z'
      contradicts: Sprint planning moved to Monday 2pm
- layer: seed
  params:
    action: alias_entities
    aliases:
    - canonical: Marketing Sync
      aliases:
      - Mkt Standup
      - Marketing Team Sync
      - Weekly Marketing
      - Mkt Weekly
    - canonical: Engineering Standup
      aliases:
      - Eng Standup
      - Daily Engineering
      - Dev Standup
      - Engineering Daily
    - canonical: 1:1 with Manager
      aliases:
      - Weekly 1-on-1
      - Manager Check-in
      - 1:1 Alex
      - Manager Sync
