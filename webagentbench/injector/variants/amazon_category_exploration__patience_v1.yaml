variant_id: amazon_category_exploration__patience_v1
base_task_id: amazon_category_exploration
target_primitive: patience
description: >
  Product listing responses are progressively delayed, requiring the
  agent to wait patiently as it browses through categories rather than
  assuming the service is down.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/amazon/products**"
      delay_ms: 3000
      behavior:
        mode: progressive
        stages:
          - after_call: 0
            delay_ms: 500
          - after_call: 3
            delay_ms: 1500
          - after_call: 5
            delay_ms: 3000
