variant_id: amazon_add_single_item__verification_v1
base_task_id: amazon_add_single_item
target_primitive: verification
description: >
  The first add-to-cart attempt silently fails (returns 200 but does not
  mutate state). The agent must verify the cart contents after adding to
  confirm the item was actually added.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/add"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
