variant_id: amazon_buy_highest_rated__state_tracking_v1
base_task_id: amazon_buy_highest_rated
target_primitive: state_tracking
description: >
  The first search returns stale empty results and the cart add silently
  fails once. The agent must track that the search initially returned no
  results and retry, and verify the cart item was actually added.
injections:
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/search**"
      stale_body:
        items: []
        total: 0
        page: 1
        page_size: 25
        pages: 0
        query: ""
      stale_count: 1
  - layer: network
    params:
      action: silent_fail
      url_pattern: "**/api/env/amazon/cart/add"
      methods: ["POST"]
      fail_count: 1
      response_body: {"cart_item": {"id": "fake_item", "product_id": "fake", "quantity": 1}}
      behavior:
        mode: once
