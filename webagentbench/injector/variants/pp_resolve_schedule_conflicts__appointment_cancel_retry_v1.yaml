variant_id: pp_resolve_schedule_conflicts__appointment_cancel_retry_v1
base_task_id: pp_resolve_schedule_conflicts
target_primitive: backtracking
description: The first appointment cancellation request returns 503. The agent must confirm the visit is still present and retry the cancellation.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/appointments/*/cancel'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary scheduling service failure. Retry the cancellation.
    behavior:
      mode: once
