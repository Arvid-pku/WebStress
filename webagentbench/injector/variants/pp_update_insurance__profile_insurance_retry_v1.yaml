variant_id: pp_update_insurance__profile_insurance_retry_v1
base_task_id: pp_update_insurance
target_primitive: backtracking
description: The first insurance update fails transiently. The agent must retry and verify the new plan details actually persisted.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/profile/insurance'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary insurance profile failure. Retry the insurance update.
    behavior:
      mode: once
