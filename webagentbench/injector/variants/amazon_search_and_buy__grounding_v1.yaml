variant_id: amazon_search_and_buy__grounding_v1
base_task_id: amazon_search_and_buy
target_primitive: grounding
description: >
  ARIA labels are scrambled making product identification harder, and the
  first cart add silently fails. The agent must ground its actions in
  visible content and verify the cart state.
injections:
  - layer: client
    params:
      action: scramble_aria
      selector: "[aria-label]"
      behavior:
        mode: persistent
  - layer: network
    params:
      action: silent_fail
      url_pattern: "**/api/env/amazon/cart/add"
      methods: ["POST"]
      fail_count: 1
      response_body: {"cart_item": {"id": "fake_item", "product_id": "fake", "quantity": 1}}
      behavior:
        mode: once
