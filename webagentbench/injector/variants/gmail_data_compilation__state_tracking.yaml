variant_id: gmail_data_compilation__state_tracking_v1
base_task_id: gmail_data_compilation
target_primitive: state_tracking
description: >
  Inject 12 topical distractor emails about data, reports, and compilation.
  Agent must aggregate specific data points from correct emails among 20+
  messages with related subjects.
injections:
- layer: seed
  params:
    action: increase_distractors
    count: 12
    topical_count: 12
    topical_subjects:
      - "Data Request Follow-up"
      - "Report Compilation Status"
      - "Data Collection Summary"
      - "Information Gathering"
      - "Data Point Verification"
      - "Report Draft Review"
      - "Data Analysis Update"
      - "Compilation Timeline"
      - "Data Source Confirmation"
      - "Report Requirements"
      - "Data Extraction Notes"
      - "Summary Report Template"
