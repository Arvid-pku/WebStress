variant_id: lms_post_in_discussion__discussion_shadow_refresh_v2
base_task_id: lms_post_in_discussion
target_primitive: grounding
description: Shadow discussion records plus a later correction compete for attention,
  so the agent must ground on the exact LMS target before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: discussion
      course_code: '{target.course_code}'
      title: '{target.discussion_title} archive'
      prompt: Archived discussion shell from a previous cohort.
      posts:
      - body: This older thread stays visible for reference only.
        author_name: Dr. Morgan Hale
    - type: discussion
      course_code: '{target.course_code}'
      discussion_id: '{target.target_discussion_id}'
      posts:
      - body: 'Reminder: use the current grading criteria, not last week''s note.'
        author_name: Course Staff
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_code: '{target.course_code}'
    type: discussion_post
    discussion_id: '{target.target_discussion_id}'
