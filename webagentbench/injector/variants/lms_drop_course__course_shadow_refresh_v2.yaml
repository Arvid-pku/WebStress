variant_id: lms_drop_course__course_shadow_refresh_v2
base_task_id: lms_drop_course
target_primitive: grounding
description: Shadow course records plus a later correction compete for attention,
  so the agent must ground on the exact LMS target before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: course
      course_code: '{target.course_code}-ALT'
      title: '{target.course_code} Alternate Section'
      status: enrolled
    - type: announcement
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: '{target.course_code} registration note'
      body: Archived enrollment reminder for a similar course code.
      priority: normal
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    course_id: '{target.target_course_id}'
    type: announcement
