variant_id: pp_update_insurance__profile_view_stale_v1
base_task_id: pp_update_insurance
target_primitive: verification
description: The first profile fetch is stale and shows outdated contact, insurance, and preventive details. The agent must refresh the profile before trusting what it sees.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/profile**'
    stale_body:
      id: pat_stale
      name: Morgan Harper
      sex: female
      dob: '1985-06-14'
      phone: (555) 010-1111
      email: morgan.harper@example.com
      insurance_plan:
        plan_name: Legacy Bronze HMO
        member_id: LEG-0001123
        group_number: GRP-00123
        copay: '50.00'
        deductible: '3500.00'
        deductible_met: '400.00'
      pcp_id: prov_stale
      allergies:
      - Penicillin
      conditions:
      - Hypertension
      pharmacy_ids: []
      emergency_contact:
        name: Jamie Harper
        phone: (555) 010-2222
        relationship: Spouse
      applicable_screenings: []
      default_pharmacy: null
    stale_count: 1
    behavior:
      mode: once
