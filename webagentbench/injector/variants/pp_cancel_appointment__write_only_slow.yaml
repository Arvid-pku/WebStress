variant_id: pp_cancel_appointment__write_only_slow
base_task_id: pp_cancel_appointment
target_primitive: patience
description: >
  Read requests are fast; write requests (cancellations, message sends)
  take 2.5s. Tests whether the agent tolerates asymmetric latency.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/patient_portal/**"
      methods: ["POST", "PUT", "PATCH", "DELETE"]
      delay_ms: 2500
      behavior:
        mode: write_only_slow
