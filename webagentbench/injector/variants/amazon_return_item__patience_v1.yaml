variant_id: amazon_return_item__patience_v1
base_task_id: amazon_return_item
target_primitive: patience
description: >
  The return endpoint has a 3-second delay on every request. The agent
  must wait patiently for the response rather than assuming failure.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/returns"
      action: delay
      delay_ms: 3000
