variant_id: amazon_reorder_past_item__exploration_v1
base_task_id: amazon_reorder_past_item
target_primitive: exploration
description: >
  The orders endpoint is delayed by 2 seconds and the first cart add
  silently fails. The agent must explore the order history patiently
  and verify the reorder was successful.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/orders**"
      action: delay
      delay_ms: 2000
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/add"
      action: silent_fail
      fail_count: 1
      methods: ["POST"]
