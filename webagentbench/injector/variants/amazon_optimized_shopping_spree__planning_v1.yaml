variant_id: amazon_optimized_shopping_spree__planning_v1
base_task_id: amazon_optimized_shopping_spree
target_primitive: planning
description: >
  The first search returns empty results and product listing has a delay.
  The agent must re-plan its approach when initial searches yield nothing.
injections:
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/search**"
      stale_body:
        items: []
        total: 0
        page: 1
        page_size: 25
        pages: 0
        query: ""
      stale_count: 1
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/amazon/products**"
      delay_ms: 2000
