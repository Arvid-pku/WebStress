variant_id: amazon_add_single_item__patience_v1
base_task_id: amazon_add_single_item
target_primitive: patience
description: >
  The cart add endpoint has progressive delays, requiring the agent to
  wait patiently for responses rather than assuming timeouts.
injections:
  - layer: network
    params:
      action: delay
      url_pattern: "**/api/env/amazon/cart/add"
      delay_ms: 3000
      behavior:
        mode: progressive
        stages:
          - after_call: 0
            delay_ms: 500
          - after_call: 3
            delay_ms: 1500
          - after_call: 5
            delay_ms: 3000
