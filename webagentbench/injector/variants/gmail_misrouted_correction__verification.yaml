variant_id: gmail_misrouted_correction__verification_v1
base_task_id: gmail_misrouted_correction
target_primitive: verification
description: Forward actions silently fail, requiring verification of successful forwarding
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/send'
    methods:
    - POST
    response_body:
      success: true
      message: Email forwarded successfully
      email_id: fake-forward-id
    fail_count: 2
    behavior:
      mode: once
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - Email that looks misrouted but is correct
    - Already forwarded email that appears new
