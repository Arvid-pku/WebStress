variant_id: amazon_budget_optimized_spree__state_tracking_v1
base_task_id: amazon_budget_optimized_spree
target_primitive: state_tracking
description: >
  The cart returns stale empty data on the first 3 reads, and one cart
  add silently fails with a fake success response. The agent must
  carefully track actual cart contents and retry failed additions.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart"
      action: stale_data
      methods: ["GET"]
      stale_count: 3
      stale_body:
        items: []
        totals: {"subtotal": 0, "shipping": 0, "tax": 0, "discount": 0, "gift_card_applied": 0, "total": 0}
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/add"
      action: silent_fail
      methods: ["POST"]
      fail_count: 1
      response_body: {"cart_item": {"id": "fake_item", "product_id": "fake", "quantity": 1}}
