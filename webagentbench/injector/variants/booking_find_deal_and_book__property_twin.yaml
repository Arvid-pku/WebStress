variant_id: booking_find_deal_and_book__property_twin
base_task_id: booking_find_deal_and_book
target_primitive: grounding
description: A near-identical property appears alongside the true target. The agent must match the exact
  hotel before saving or booking it.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    # Four near-typo siblings of "Lisbon Riverside Retreat". rs > target's
    # 8.5 to lure rating sorts. None have entries on the Deals page so
    # "navigate to Deals and find the deal for {name}" still surfaces
    # only the real one.
    - type: property
      name: Lisbon Riverside Retreatt    # extra t
      city: Lisbon
      country: Portugal
      property_type: Hotel
      star_rating: 4
      review_score: 8.7
      review_count: 860
      price: 170.0
      description: Nearly identical property name with slightly different review profile.
    - type: property
      name: Lisbon Riveside Retreat      # drop r
      city: Lisbon
      country: Portugal
      property_type: Hotel
      star_rating: 4
      review_score: 8.6
      review_count: 640
      price: 168.0
      description: Similar branding can distract from the exact property match.
    - type: property
      name: Lisbom Riverside Retreat     # Lisbon → Lisbom
      city: Lisbon
      country: Portugal
      property_type: Hotel
      star_rating: 4
      review_score: 8.8
      review_count: 720
      price: 172.0
      description: City-name typo at the prefix.
    - type: property
      name: Lisbon Riverside Reteat      # drop r in Retreat
      city: Lisbon
      country: Portugal
      property_type: Hotel
      star_rating: 4
      review_score: 8.9
      review_count: 980
      price: 175.0
      description: Suffix-word typo (Retreat → Reteat).
