variant_id: pp_update_default_pharmacy__default_pharmacy_retry_v1
base_task_id: pp_update_default_pharmacy
target_primitive: backtracking
description: The first default-pharmacy update fails transiently. The agent must retry and verify the correct pharmacy became the sole default.
injections:
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/patient_portal/profile/pharmacy/*/set-default'
    methods:
    - POST
    error_count: 1
    error_status: 503
    error_message: Temporary pharmacy profile failure. Retry the default-pharmacy update.
    behavior:
      mode: once
