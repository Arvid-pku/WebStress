variant_id: amazon_search_and_buy__backtracking_v1
base_task_id: amazon_search_and_buy
target_primitive: backtracking
description: >
  The first two add-to-cart attempts and the first checkout attempt
  return 503 Service Unavailable. The agent must detect the failure,
  backtrack, and retry the operations.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/cart/add"
      action: error_then_success
      error_status: 503
      error_count: 2
      methods: ["POST"]
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: error_then_success
      error_status: 503
      error_count: 1
      methods: ["POST"]
