variant_id: amazon_gift_purchase__backtracking_v1
base_task_id: amazon_gift_purchase
target_primitive: backtracking
description: >
  The first address creation and the first checkout attempt return 503.
  The agent must detect each failure, backtrack, and retry the
  operations to complete the gift purchase.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/addresses"
      action: error_then_success
      error_status: 503
      error_count: 1
      methods: ["POST"]
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: error_then_success
      error_status: 503
      error_count: 1
      methods: ["POST"]
