variant_id: lms_comprehensive_discussion__discussion_retry_v1
base_task_id: lms_comprehensive_discussion
target_primitive: patience
description: A task-critical LMS route is delayed or fails transiently. The agent
  must wait, retry, and keep progress coherent.
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/lms/discussions/*/posts'
    methods: &id001
    - POST
    delay_ms: 1600
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 800
      - after_call: 2
        delay_ms: 1600
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/lms/discussions/*/posts'
    methods: *id001
    error_count: 1
    error_status: 503
    error_message: Temporary LMS failure. Retry the request.
    behavior:
      mode: once
