variant_id: lms_grade_appeal_preparation__discussion_state_shadow_v1
base_task_id: lms_grade_appeal_preparation
target_primitive: state_tracking
description: Additional LMS shadows split relevant state across similar entities.
  The agent must track the right object throughout the workflow.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: discussion
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: Week 4 discussion archive
      prompt: Archived discussion shell from a previous cohort.
      posts:
      - body: This older thread stays visible for reference only.
        author_name: Dr. Morgan Hale
    - type: discussion
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      discussion_id: '{target.target_discussion_id}'
      posts:
      - body: 'Reminder: use the current grading criteria, not last week''s note.'
        author_name: Course Staff
- layer: server
  params:
    action: scramble_timestamps
    seed: 42
