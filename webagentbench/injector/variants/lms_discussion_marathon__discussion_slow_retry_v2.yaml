variant_id: lms_discussion_marathon__discussion_slow_retry_v2
base_task_id: lms_discussion_marathon
target_primitive: patience
description: A task-critical LMS read path is slow and transiently unavailable. The
  agent must keep retrying without losing its place.
injections:
- layer: network
  params:
    action: delay
    url_pattern: '**/api/env/lms/courses/*/discussions'
    methods:
    - GET
    delay_ms: 1800
    behavior:
      mode: progressive
      stages:
      - after_call: 0
        delay_ms: 900
      - after_call: 2
        delay_ms: 1800
- layer: network
  params:
    action: error_then_success
    url_pattern: '**/api/env/lms/courses/*/discussions'
    methods:
    - GET
    error_count: 1
    error_status: 503
    error_message: Temporary LMS read failure. Refresh and try again.
    behavior:
      mode: once
