variant_id: gmail_workspace_standardization__verification_v2
base_task_id: gmail_workspace_standardization
target_primitive: verification
description: 30% of settings PUT requests silently fail throughout. Agent must verify
  each change, not just the first.
injections:
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/gmail/settings'
    response_body:
      settings:
        id: settings_gmail
        signature: ''
        forwarding_address: ''
        display_density: comfortable
        vacation_responder_enabled: false
        vacation_responder_message: ''
        auto_advance: newer
        language: English (US)
        input_tools_enabled: true
        right_to_left: false
        max_page_size: 50
        undo_send_seconds: 5
        default_reply_behavior: reply
        hover_actions_enabled: true
        send_and_archive: false
        default_text_style: Sans Serif
    methods:
    - PUT
    behavior:
      mode: intermittent
      probability: 0.3
      seed: 42
