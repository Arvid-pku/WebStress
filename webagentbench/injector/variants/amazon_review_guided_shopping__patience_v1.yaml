variant_id: amazon_review_guided_shopping__patience_v1
base_task_id: amazon_review_guided_shopping
target_primitive: patience
description: >
  Product detail pages and review listings have 5-second delays.
  The agent must wait patiently for product and review data to load
  rather than abandoning or retrying prematurely.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products/*"
      action: delay
      methods: ["GET"]
      delay_ms: 5000
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/products/*/reviews"
      action: delay
      methods: ["GET"]
      delay_ms: 5000
