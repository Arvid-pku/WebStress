variant_id: amazon_category_exploration__cart_add_retry
base_task_id: amazon_category_exploration
target_primitive: planning
description: >
  Three-layer category-bait + verification trap (Recipe A adapted):
  cart starts pre-poisoned with 3 cart_items in WRONG categories
  (Electronics, Beauty, Toys & Games) — none of which satisfy the
  predicate `category in [cat_1, cat_2, cat_3]`. The first two
  /cart/add POSTs silent-fail with a templated body. The first
  /checkout POST misleading-successes with a fake order body. The
  agent must (i) realize the pre-populated cart isn't the right
  category mix, (ii) replace those items with real picks from the
  three target categories, AND (iii) verify the order persisted —
  otherwise canonical_diff `category in [cat_1, cat_2, cat_3]` fails
  for the wrong-category decoys. Tests planning + verification.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: product
      name: Wireless Mouse Refurb
      brand: GenericAccessories
      seller: ResellerHub
      category: Electronics
      price: 12.99
      rating: 3.8
      review_count: 65
    - type: product
      name: Travel Toiletry Pack
      brand: GenericAccessories
      seller: ResellerHub
      category: Beauty
      price: 9.99
      rating: 3.9
      review_count: 91
    - type: product
      name: Mini Puzzle Set
      brand: GenericAccessories
      seller: ResellerHub
      category: Toys & Games
      price: 6.49
      rating: 4.0
      review_count: 47
    - type: cart_item
      product_name: Wireless Mouse Refurb
      quantity: 1
    - type: cart_item
      product_name: Travel Toiletry Pack
      quantity: 1
    - type: cart_item
      product_name: Mini Puzzle Set
      quantity: 1
- layer: network
  params:
    action: silent_fail
    url_pattern: '**/api/env/amazon/cart/add'
    methods:
    - POST
    fail_count: 2
    response_body:
      cart_item:
        id: 'cart_pending_{request.product_id}'
        product_id: '{request.product_id}'
        product_name: 'Pending: {request.product_id}'
        quantity: '{request.quantity}'
        unit_price: 0.0
        variant_selections: {}
        added_at: '2026-04-26T08:00:00+00:00'
    behavior:
      mode: once
- layer: network
  params:
    action: misleading_success
    url_pattern: '**/api/env/amazon/checkout'
    methods:
    - POST
    fail_count: 1
    success_body:
      order:
        id: order_pending_fake
        items: []
        shipping_address_id: ''
        payment_method_id: ''
        subtotal: 0.0
        shipping_cost: 0.0
        tax: 0.0
        discount: 0.0
        total: 0.0
        status: confirmed
        placed_at: '2026-04-26T08:00:00+00:00'
        estimated_delivery: 'Arriving in 3 days'
        promo_code:
