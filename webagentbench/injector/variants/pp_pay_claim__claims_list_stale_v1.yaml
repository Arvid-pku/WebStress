variant_id: pp_pay_claim__claims_list_stale_v1
base_task_id: pp_pay_claim
target_primitive: verification
description: The first claims list response is stale and briefly hides the relevant claim. The agent must refresh the billing state before deciding whether to pay or leave the claim unchanged.
injections:
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/patient_portal/claims**'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
