variant_id: amazon_optimized_shopping_spree__state_tracking_v1
base_task_id: amazon_optimized_shopping_spree
target_primitive: state_tracking
description: >
  The cart returns stale data on first read and the first cart add
  silently fails. The agent must carefully track actual cart contents
  across multiple category purchases.
injections:
  - layer: network
    params:
      action: stale_data
      url_pattern: "**/api/env/amazon/cart"
      stale_body:
        items: []
        totals: {"subtotal": 0, "shipping": 0, "tax": 0, "discount": 0, "gift_card_applied": 0, "total": 0}
      stale_count: 1
  - layer: network
    params:
      action: silent_fail
      url_pattern: "**/api/env/amazon/cart/add"
      methods: ["POST"]
      fail_count: 1
      response_body: {"cart_item": {"id": "fake_item", "product_id": "fake", "quantity": 1}}
      behavior:
        mode: once
