variant_id: amazon_cascading_return_replace__backtracking_v1
base_task_id: amazon_cascading_return_replace
target_primitive: backtracking
description: >
  The return API returns 503 errors on the first 2 attempts, and the
  checkout API returns 503 on the first attempt. The agent must handle
  transient server errors by retrying failed operations.
injections:
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/returns"
      action: error_then_success
      methods: ["POST"]
      error_status: 503
      error_count: 2
  - layer: network
    params:
      url_pattern: "**/api/env/amazon/checkout"
      action: error_then_success
      methods: ["POST"]
      error_status: 503
      error_count: 1
