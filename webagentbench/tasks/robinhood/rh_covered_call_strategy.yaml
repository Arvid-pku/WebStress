task_id: rh_covered_call_strategy
env_id: robinhood
title: Sell Covered Call on AAPL Position
instruction_template: "You own 100 shares of AAPL. Sell a covered call with expiration approximately 30 days out, at a strike price 10% above the current price. Report the premium you will collect."
difficulty: hard
time_limit_seconds: 250
expected_steps: 10
primary_primitives:
  - state_tracking
  - exploration
  - planning
  - grounding
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["AAPL", "MSFT", "TSLA"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT"]
        quantities: ["100", "50"]
        cost_bases: ["165.00", "370.00"]
      outputs: []
    - use: options_chain
      params:
        symbol: "AAPL"
        expirations_count: 6
        strikes_per_expiration: 12
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(oo.strategy in ('covered_call', 'single') and any(leg.option_type == 'call' and leg.side == 'sell' for leg in oo.legs) for oo in state.options_orders)"
      desc: An options order exists with a sold call leg (covered call)
  negative_checks: []
