---
task_id: rh_live_alert_and_sell
env_id: robinhood
title: Alert-Triggered Market Sell
instruction_template: Set a price alert for TSLA when it goes above $270. When the
  alert triggers, sell your entire TSLA position at market price.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- planning
- patience
- grounding
start_path: "/"
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - TSLA
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - TSLA
      quantities:
      - '10'
      cost_bases:
      - '240.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      TSLA:
        keyframes:
        - - 0
          - 248.0
        - - 22
          - 275.0
        - - 35
          - 272.0
        noise_pct: 0.3
eval:
  source: server_state
  checks:
  - expr: >-
      len([a for a in state.price_alerts
           if a.symbol == 'TSLA' and a.condition == 'above'
           and not a.id.startswith('alert_decoy_')]) == 1
    desc: Exactly one TSLA above-$270 alert was created
  - expr: >-
      any(a.symbol == 'TSLA' and a.condition == 'above' and a.status == 'triggered'
      and a.triggered_at is not None
      for a in state.price_alerts)
    desc: The TSLA price alert triggered
  - expr: >-
      any(o.symbol == 'TSLA' and o.side == 'sell' and o.status == 'filled' and
          o.quantity == state.initial_quantity('TSLA') and
          any(a.symbol == 'TSLA' and a.condition == 'above' and a.triggered_at is not None
              and o.created_at > a.triggered_at
              for a in state.price_alerts)
          for o in state.orders)
    desc: The entire TSLA position was sold after the alert triggered
  - expr: >-
      sum(1 for o in state.orders if not o.id.startswith('ord_decoy_')) == 1
    desc: Only the intended alert-triggered sell order was placed
  - expr: >-
      state.get_position('TSLA') is None
    desc: TSLA was fully liquidated
  negative_checks:
  - expr: not any(o.symbol == 'TSLA' and o.side == 'buy' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: The trigger caused a sell, not an additional buy
    penalty: 0.25
  - expr: >-
      not any(o.side == 'sell' and o.symbol != 'TSLA'
      and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: No sell orders were placed on unrelated symbols
    penalty: 0.15
  - expr: >-
      not any(o.side != 'sell' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: No non-sell orders were placed during the sell-only workflow
    penalty: 0.15
secondary_primitives: []
primitive_thesis: Measures planning, patience, grounding by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
