task_id: rh_live_stop_loss_execution
env_id: robinhood
title: Stop-Loss Order Execution
instruction_template: You own 5 shares of NVDA. Set a stop-loss order at 8% below
  the current price to protect against a downturn.
difficulty: hard
time_limit_seconds: 250
expected_steps: 10
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - NVDA
      - AAPL
      - MSFT
    outputs: []
  - use: portfolio_basic
    params:
      stocks:
      - NVDA
      quantities:
      - '5'
      cost_bases:
      - '850.00'
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      NVDA:
        keyframes:
        - - 0
          - 875.0
        - - 25
          - 800.0
        - - 40
          - 815.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: orders
    desc: NVDA stop-loss sell order for 5 shares at ~8% below starting price
    properties:
      symbol: {eq: NVDA}
      side: {eq: sell}
      order_type: {eq: stop}
      quantity: {eq: 5}
      stop_price: {expr: "x is not None and x >= initial.get_stock('NVDA').price * Decimal('0.86') and x <= initial.get_stock('NVDA').price * Decimal('0.94')"}
      status: {any: true}
      limit_price: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      time_in_force: {any: true}
      extended_hours: {any: true}
  invariant:
  - collection: state.positions
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
  - collection: state.options_positions
    preserve: ALL
  - collection: state.options_orders
    preserve: ALL
  - collection: state.recurring_investments
    preserve: ALL
  - collection: state.linked_banks
    preserve: ALL
  - collection: state.tax_documents
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures planning, grounding, state_tracking by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
