task_id: rh_transfer_and_withdraw
env_id: robinhood
title: Check Balance and Withdraw Half
instruction_template: "Check your cash balance, then withdraw half of it to your Wells Fargo savings account."
difficulty: medium
time_limit_seconds: 150
expected_steps: 5
primary_primitives:
  - state_tracking
  - planning
start_path: /

seed:
  distractors: 10
  steps:
    - use: linked_banks
      params:
        banks:
          - name: "Chase Checking"
            type: "checking"
            last_four: "4521"
          - name: "Wells Fargo Savings"
            type: "savings"
            last_four: "7793"
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(t.direction == 'withdrawal' and t.amount == 2500 for t in state.transfers)"
      desc: A withdrawal of $2,500 (half of $5,000 cash balance) exists
  negative_checks: []
