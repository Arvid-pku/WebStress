---
task_id: rh_options_income_portfolio
env_id: robinhood
title: Build Monthly Options Income Strategy
instruction_template: Build a monthly income strategy across your portfolio. For each
  stock where you own 100 or more shares, sell a covered call at the nearest monthly
  expiration with a delta closest to 0.30. For stocks where you own fewer than 100
  shares, sell a cash-secured put at a delta closest to -0.30.
difficulty: frontier
time_limit_seconds: 500
expected_steps: 32
primary_primitives:
- state_tracking
- planning
- exploration
- grounding
- verification
start_path: "/"
seed:
  distractors: 20
  steps:
  - use: stock_universe
    params:
      count: 30
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
      - META
    outputs: []
  - use: portfolio_diverse
    params:
      position_count: 6
      mixed_quantities: true
    outputs: []
  - use: options_chain
    params:
      symbol: AAPL
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: options_chain
    params:
      symbol: MSFT
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: options_chain
    params:
      symbol: GOOGL
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: options_chain
    params:
      symbol: AMZN
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: options_chain
    params:
      symbol: TSLA
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: options_chain
    params:
      symbol: META
      expirations_count: 2
      strikes_per_expiration: 15
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: all(any(any(leg.underlying_symbol == sym and leg.side == 'sell' and leg.option_type
      == 'call' for leg in oo.legs) for oo in state.options_orders_for_symbol(sym))
      for sym in state.position_symbols_at_or_above_shares(Decimal('100')))
    desc: Every 100-plus-share holding received a covered-call sell order
  - expr: all(any(any(leg.underlying_symbol == p.symbol and leg.side == 'sell' and
      leg.option_type == 'put' for leg in oo.legs) for oo in state.options_orders_for_symbol(p.symbol))
      for p in state.positions if p.quantity < Decimal('100'))
    desc: Every sub-100-share holding received a cash-secured-put style sell order
  negative_checks:
  - expr: not any(any(leg.side == 'buy' for leg in oo.legs) for oo in state.options_orders)
    desc: The income strategy did not include unnecessary long-option legs
secondary_primitives: []
primitive_thesis: Measures state_tracking, planning, exploration, grounding, verification
  by requiring exact completion of the requested Robinhood workflow while ignoring
  distractor account state.
