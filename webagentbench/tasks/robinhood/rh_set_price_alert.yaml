task_id: rh_set_price_alert
env_id: robinhood
title: Set a Price Alert for a Stock
instruction_template: "Set a price alert for GOOGL when it goes above $180.00."
difficulty: easy
time_limit_seconds: 90
expected_steps: 5
primary_primitives:
  - grounding
start_path: /

seed:
  distractors: 5
  steps:
    - use: stock_universe
      params:
        count: 20
        must_include: ["GOOGL", "AAPL", "MSFT"]
      outputs: []
    - use: price_alerts
      params:
        count: 2
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(a.symbol == 'GOOGL' and a.condition == 'above' and a.target_price == 180 for a in state.price_alerts)"
      desc: A price alert for GOOGL above $180.00 exists
    - expr: "len([a for a in state.price_alerts if a.symbol == 'GOOGL' and a.condition == 'above' and a.target_price == 180]) == 1"
      desc: Exactly one GOOGL above $180 alert exists (no duplicates)
  negative_checks:
    - expr: >-
        len([o for o in state.orders
             if not o.id.startswith('ord_decoy_')]) == 0
      desc: Agent did not place any orders (task only required setting a price alert)
      penalty: 0.15
