task_id: rh_sector_concentration
env_id: robinhood
title: Reduce Technology Sector Concentration
instruction_template: "Calculate what percentage of your portfolio is in the Technology sector. If it exceeds 50%, sell enough of your most overweight tech stock to bring Technology to exactly 50% of the portfolio, then buy SCHD with the proceeds."
difficulty: hard
time_limit_seconds: 280
expected_steps: 12
primary_primitives:
  - state_tracking
  - planning
  - grounding
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 30
        must_include: ["AAPL", "MSFT", "GOOGL", "NVDA", "SCHD", "JNJ", "KO"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT", "GOOGL", "NVDA", "JNJ", "KO"]
        quantities: ["50", "30", "25", "10", "15", "20"]
        cost_bases: ["170.00", "380.00", "155.00", "800.00", "155.00", "55.00"]
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(o.symbol == 'SCHD' and o.side == 'buy' for o in state.orders)"
      desc: A buy order for SCHD exists
    - expr: "any(o.side == 'sell' for o in state.orders)"
      desc: A sell order for a tech stock exists
  negative_checks: []
