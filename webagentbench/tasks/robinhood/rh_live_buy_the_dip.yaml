task_id: rh_live_buy_the_dip
env_id: robinhood
title: Buy the Dip with Limit Order
instruction_template: AAPL is currently around $190. Place a limit buy order for 10
  shares at $180 or below, good-till-cancelled. Wait for it to fill and confirm.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- patience
start_path: /
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 15
          - 178.5
        - - 30
          - 185.0
        noise_pct: 0.3
canonical_diff:
  create:
  - entity: orders
    desc: Place GTC AAPL limit buy for 10 shares at ≤4% below session-start price
    bijection:
      over: "['AAPL']"
      variable: sym
    properties:
      symbol: {eq: AAPL}
      side: {eq: buy}
      order_type: {eq: limit}
      time_in_force: {eq: gtc}
      quantity: {eq: 10}
      limit_price: {expr: "x is not None and float(x) <= float(initial.get_stock('AAPL').price) * 0.96"}
      status: {any: true}
      filled_quantity: {any: true}
      filled_price: {any: true}
      stop_price: {any: true}
      trail_amount: {any: true}
      trail_pct: {any: true}
      extended_hours: {any: true}
  invariant:
  - collection: state.orders
    filter: "(a.side == 'buy' and a.symbol != 'AAPL') or a.side == 'sell'"
    preserve: ALL
  - collection: state.positions
    preserve: ALL
  - collection: state.watchlists
    preserve: ALL
  - collection: state.price_alerts
    preserve: ALL
  - collection: state.transfers
    preserve: ALL
secondary_primitives: []
primitive_thesis: Measures planning, patience, verification by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
