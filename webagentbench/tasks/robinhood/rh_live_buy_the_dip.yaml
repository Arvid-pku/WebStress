task_id: rh_live_buy_the_dip
env_id: robinhood
title: Buy the Dip with Limit Order
instruction_template: "AAPL is currently around $190. Place a limit buy order for 10 shares at $180 or below, good-till-cancelled. Wait for it to fill and confirm."
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
  - planning
  - patience
  - verification
start_path: /

seed:
  distractors: 5
  steps:
    - use: stock_universe
      params:
        count: 20
        must_include: ["AAPL", "TSLA", "MSFT"]
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
          - [0, 190.0]
          - [15, 178.5]
          - [30, 185.0]
        noise_pct: 0.3

eval:
  source: server_state
  checks:
    - expr: "any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'limit' and o.status == 'filled' and o.quantity == 10 for o in state.orders)"
      desc: A filled limit buy order for 10 shares of AAPL exists
  negative_checks: []
