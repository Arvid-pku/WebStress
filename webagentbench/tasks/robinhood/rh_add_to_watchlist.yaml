task_id: rh_add_to_watchlist
env_id: robinhood
title: Add Stock to Existing Watchlist
instruction_template: 'Add NVDA to your "Tech Stocks" watchlist.'
difficulty: easy
time_limit_seconds: 90
expected_steps: 5
primary_primitives:
  - grounding
start_path: /

seed:
  distractors: 5
  steps:
    - use: stock_universe
      params:
        count: 20
        must_include: ["NVDA", "AAPL", "MSFT"]
      outputs: []
    - use: watchlist
      params:
        name: "Tech Stocks"
        symbols: ["AAPL", "MSFT"]
      outputs: [watchlist_id]
  targets:
    watchlist_id: "{output.watchlist_id}"

eval:
  source: server_state
  checks:
    - expr: "any('NVDA' in w.symbols and w.name == 'Tech Stocks' for w in state.watchlists)"
      desc: NVDA is in the Tech Stocks watchlist
    - expr: "len([w for w in state.watchlists if w.name == 'Tech Stocks']) == 1"
      desc: Exactly one watchlist named Tech Stocks exists (no duplicates)
  negative_checks:
    - expr: >-
        not any(w.name != 'Tech Stocks' and 'NVDA' in w.symbols
                for w in state.watchlists)
      desc: NVDA was not added to any other watchlist
      penalty: 0.25
