task_id: rh_find_earnings_and_alert
env_id: robinhood
title: Find Earnings Stocks and Set Price Alerts
instruction_template: "Find which stocks in your portfolio have earnings in the next 7 days. For each, create a price alert set at 5% below their current price."
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
  - exploration
  - state_tracking
  - planning
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["AAPL", "MSFT", "GOOGL", "AMZN", "META", "NVDA"]
      outputs: []
    - use: portfolio_diverse
      params:
        count: 6
      outputs: []
    - use: earnings_calendar
      params:
        days_ahead: 7
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "len(state.price_alerts) >= 1"
      desc: At least one price alert was created for a stock with upcoming earnings
    - expr: >-
        len([a for a in state.price_alerts if a.status == 'active']) >= 1
      desc: At least one active price alert exists
    - expr: >-
        all(a.condition == 'below' for a in state.price_alerts
            if a.status == 'active' and not a.id.startswith('alert_decoy_'))
      desc: All agent-created alerts are set to trigger below current price (5% below)
  negative_checks:
    - expr: >-
        len([o for o in state.orders
            if not o.id.startswith('ord_decoy_')]) == 0
      desc: No orders were placed (task only required setting price alerts)
      penalty: 0.15
