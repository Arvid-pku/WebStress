task_id: rh_mark_notifications_read
env_id: robinhood
title: Mark All Notifications as Read
instruction_template: "Mark all unread notifications as read."
difficulty: easy
time_limit_seconds: 90
expected_steps: 5
primary_primitives:
  - grounding
  - patience
start_path: /

seed:
  distractors: 5
  steps:
    - use: stock_universe
      params:
        count: 10
      outputs: []
    - use: notifications
      params:
        count: 8
        unread_ratio: 0.6
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "len(state.notifications) >= 1 and all(n.is_read for n in state.notifications)"
      desc: All notifications are marked as read (vacuous-truth guarded)
    - expr: "len(state.notifications) >= 8"
      desc: All 8 seed notifications still exist (none deleted)
  negative_checks:
    - expr: >-
        len([o for o in state.orders
             if not o.id.startswith('ord_decoy_')]) == 0
      desc: Agent did not place any orders (task only required marking notifications)
      penalty: 0.15
