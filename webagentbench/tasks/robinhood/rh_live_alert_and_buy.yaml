---
task_id: rh_live_alert_and_buy
env_id: robinhood
title: Alert-Triggered Market Buy
instruction_template: Set a price alert for AAPL when it drops below $182. When the
  alert triggers, buy 5 shares at market price.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- planning
- patience
- grounding
start_path: "/"
seed:
  distractors: 5
  steps:
  - use: stock_universe
    params:
      count: 20
      must_include:
      - AAPL
      - TSLA
      - MSFT
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
        - - 0
          - 190.0
        - - 18
          - 179.0
        - - 30
          - 184.0
        noise_pct: 0.3
eval:
  source: server_state
  checks:
  - expr: >-
      len([a for a in state.price_alerts
           if a.symbol == 'AAPL' and a.condition == 'below'
           and not a.id.startswith('alert_decoy_')]) == 1
    desc: Exactly one AAPL below-$182 alert was created
  - expr: >-
      any(a.symbol == 'AAPL' and a.condition == 'below' and a.status == 'triggered'
      and a.triggered_at is not None
      for a in state.price_alerts)
    desc: The AAPL price alert triggered
  - expr: >-
      any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type == 'market'
      and o.status == 'filled' and o.quantity == 5
      and any(a.symbol == 'AAPL' and a.condition == 'below' and a.triggered_at is not None
              and o.created_at > a.triggered_at
              for a in state.price_alerts)
      for o in state.orders)
    desc: A filled market buy order for 5 shares of AAPL was placed after the alert triggered
  - expr: >-
      sum(1 for o in state.orders if not o.id.startswith('ord_decoy_')) == 1
    desc: Only the intended alert-triggered buy order was placed
  - expr: >-
      state.get_position('AAPL') is not None and state.get_position('AAPL').quantity == 5
    desc: The AAPL position reflects the purchased shares
  negative_checks:
  - expr: not any(o.symbol == 'AAPL' and o.side == 'buy' and o.order_type != 'market'
      and not o.id.startswith('ord_decoy_') for o in state.orders)
    desc: The triggered buy used a market order rather than a limit or stop order
    penalty: 0.25
  - expr: >-
      not any(o.side == 'sell' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: No sell orders were placed during the alert-triggered buy
    penalty: 0.15
  - expr: >-
      not any(o.symbol != 'AAPL' and not o.id.startswith('ord_decoy_')
      for o in state.orders)
    desc: No orders were placed on unrelated symbols
    penalty: 0.15
secondary_primitives: []
primitive_thesis: Measures planning, patience, grounding by requiring exact completion
  of the requested Robinhood workflow while ignoring distractor account state.
