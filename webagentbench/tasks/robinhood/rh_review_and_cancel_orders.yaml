---
task_id: rh_review_and_cancel_orders
env_id: robinhood
title: Review and Cancel Far-Below-Market Limit Orders
instruction_template: Find all pending limit buy orders with prices more than 10%
  below current market price and cancel them.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- state_tracking
- grounding
- planning
start_path: "/"
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
    outputs: []
  - use: pending_orders
    params:
      count: 5
      order_types:
      - limit
      symbols:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      far_below_count: 2
    outputs:
    - order_ids
  targets: {}
eval:
  source: server_state
  checks:
  - expr: len(state.pending_limit_buy_orders_more_than_pct_below_market(Decimal('10')))
      >= 1 or sum(1 for o in state.orders if o.status == 'cancelled' and o.order_type
      == 'limit' and o.side == 'buy' and o.limit_price is not None and float(o.limit_price)
      < float(state.get_stock(o.symbol).price) * 0.90) >= 1
    desc: At least one far-below-market limit buy order was cancelled
  - expr: all(o.status == 'cancelled' for o in state.orders if o.order_type == 'limit'
      and o.side == 'buy' and o.limit_price is not None and float(o.limit_price) <
      float(state.get_stock(o.symbol).price) * 0.90)
    desc: All far-below-market limit buy orders were cancelled
  - expr: sum(1 for o in state.orders if o.status == 'pending' and o.order_type ==
      'limit' and o.side == 'buy' and o.limit_price is not None and float(o.limit_price)
      >= float(state.get_stock(o.symbol).price) * 0.90) >= 1
    desc: At least one reasonably priced order remains pending
  negative_checks:
  - expr: not any(o.status == 'cancelled' and o.order_type == 'limit' and o.side ==
      'buy' and o.limit_price is not None and float(o.limit_price) >= float(state.get_stock(o.symbol).price)
      * 0.90 for o in state.orders)
    desc: Reasonably priced limit buy orders were not cancelled
secondary_primitives: []
primitive_thesis: Measures state_tracking, grounding, planning by requiring exact
  completion of the requested Robinhood workflow while ignoring distractor account
  state.
