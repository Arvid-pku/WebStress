task_id: rh_sell_loser_buy_winner
env_id: robinhood
title: Sell Worst Performer and Buy Best Performer
instruction_template: Find the worst-performing stock in your portfolio by total return
  %. Sell all of it, then buy more of your best-performing stock with the proceeds.
difficulty: medium
time_limit_seconds: 200
expected_steps: 8
primary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - TSLA
    outputs: []
  - use: portfolio_diverse
    params:
      count: 5
      include_losers: true
    outputs:
    - worst_symbol
    - best_symbol
  targets:
    worst_symbol: '{output.worst_symbol}'
    best_symbol: '{output.best_symbol}'
eval:
  source: server_state
  checks:
  - expr: "len([o for o in state.orders\n    if o.side == 'sell' and not o.id.startswith('ord_decoy_')])\
      \ >= 1"
    desc: A sell order exists (non-decoy)
  - expr: "len([o for o in state.orders\n    if o.side == 'buy' and not o.id.startswith('ord_decoy_')])\
      \ >= 1"
    desc: A buy order exists (non-decoy)
  - expr: "any(o.symbol == '{target.worst_symbol}' and o.side == 'sell'\n    and not\
      \ o.id.startswith('ord_decoy_')\n    for o in state.orders)"
    desc: The sell order targets the worst-performing stock
  negative_checks:
  - expr: "(not any(o.symbol == '{target.best_symbol}' and o.side == 'sell'\n    \
      \     and not o.id.startswith('ord_decoy_')\n         for o in state.orders)\n\
      \ and not any(o.symbol == '{target.worst_symbol}' and o.side == 'buy'\n    \
      \         and not o.id.startswith('ord_decoy_')\n             for o in state.orders))"
    desc: Agent did not sell the best performer or buy the worst performer
    penalty: 0.25
secondary_primitives: []
