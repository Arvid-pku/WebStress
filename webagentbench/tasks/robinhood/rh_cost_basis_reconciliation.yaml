task_id: rh_cost_basis_reconciliation
env_id: robinhood
title: Reconcile AAPL Cost Basis Against Transactions
instruction_template: "Compare the lot-level cost basis shown in your AAPL position against your AAPL purchase transactions. Report the total cost basis from each source and identify any discrepancy."
difficulty: hard
time_limit_seconds: 250
expected_steps: 10
primary_primitives:
  - state_tracking
  - verification
  - grounding
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["AAPL", "MSFT", "GOOGL"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT"]
        quantities: ["75", "30"]
        cost_bases: ["172.50", "385.00"]
      outputs: []
    - use: transaction_ledger
      params:
        months: 3
        symbols: ["AAPL", "MSFT"]
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "len(state.orders) == 0"
      desc: No unintended trades were placed (reporting task only)
  negative_checks: []
