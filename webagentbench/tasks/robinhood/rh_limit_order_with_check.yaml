task_id: rh_limit_order_with_check
env_id: robinhood
title: Check Price Then Place Limit Buy Order
instruction_template: "Check AMZN's current price, then place a limit buy order for 10 shares at 5% below current price, good-till-cancelled."
difficulty: medium
time_limit_seconds: 150
expected_steps: 6
primary_primitives:
  - grounding
  - planning
  - state_tracking
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["AMZN", "AAPL", "MSFT", "GOOGL"]
      outputs: []
    - use: portfolio_basic
      params:
        stocks: ["AAPL", "MSFT"]
        quantities: ["15", "10"]
        cost_bases: ["180.00", "370.00"]
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(o.symbol == 'AMZN' and o.side == 'buy' and o.order_type == 'limit' and o.quantity == 10 and o.time_in_force == 'gtc' and o.status == 'pending' for o in state.orders)"
      desc: A pending limit buy order for 10 shares of AMZN with GTC time-in-force exists
  negative_checks: []
