task_id: rh_live_watch_portfolio
env_id: robinhood
title: Watch Portfolio Value and Sell Winner
instruction_template: "Monitor your total portfolio value. When it crosses above $15,000, sell your most profitable position by total return percentage to lock in gains."
difficulty: hard
time_limit_seconds: 280
expected_steps: 18
primary_primitives:
  - patience
  - state_tracking
  - planning
start_path: /

seed:
  distractors: 5
  steps:
    - use: stock_universe
      params:
        count: 20
        must_include: ["AAPL", "TSLA", "MSFT", "GOOGL"]
      outputs: []
    - use: portfolio_diverse
      params:
        total_value_target: 14200
      outputs: []
  targets: {}
  price_trajectory:
    tick_interval_seconds: 2
    stocks:
      AAPL:
        keyframes:
          - [0, 189.0]
          - [18, 210.0]
          - [30, 208.0]
        noise_pct: 0.3

eval:
  source: server_state
  checks:
    - expr: "any(o.side == 'sell' and o.status == 'filled' for o in state.orders)"
      desc: The most profitable position was sold to lock in gains
  negative_checks: []
