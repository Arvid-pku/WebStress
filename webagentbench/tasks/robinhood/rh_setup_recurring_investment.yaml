task_id: rh_setup_recurring_investment
env_id: robinhood
title: Set Up Monthly Recurring Investment
instruction_template: "Set up a monthly $200 recurring investment into VOO starting next Monday."
difficulty: medium
time_limit_seconds: 150
expected_steps: 5
primary_primitives:
  - planning
  - exploration
start_path: /

seed:
  distractors: 10
  steps:
    - use: stock_universe
      params:
        count: 25
        must_include: ["VOO", "SPY", "QQQ", "VTI"]
      outputs: []
    - use: linked_banks
      params: {}
      outputs: []
  targets: {}

eval:
  source: server_state
  checks:
    - expr: "any(ri.symbol == 'VOO' and ri.amount == 200 and ri.frequency == 'monthly' and ri.status == 'active' for ri in state.recurring_investments)"
      desc: A monthly $200 recurring investment into VOO exists
  negative_checks: []
