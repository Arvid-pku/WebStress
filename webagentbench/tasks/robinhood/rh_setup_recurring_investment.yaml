task_id: rh_setup_recurring_investment
env_id: robinhood
title: Set Up Monthly Recurring Investment
instruction_template: Set up a monthly $200 recurring investment into VOO starting
  next Monday.
difficulty: medium
time_limit_seconds: 150
expected_steps: 5
primary_primitives:
- planning
start_path: /
seed:
  distractors: 10
  steps:
  - use: stock_universe
    params:
      count: 25
      must_include:
      - VOO
      - SPY
      - QQQ
      - VTI
    outputs: []
  - use: linked_banks
    params: {}
    outputs: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: "any(ri.symbol == 'VOO' and ri.amount == 200 and ri.frequency == 'monthly'\n\
      \    and ri.status == 'active'\n    for ri in state.recurring_investments)"
    desc: A monthly $200 recurring investment into VOO exists and is active
  - expr: "any(ri.symbol == 'VOO' and ri.status == 'active'\n    for ri in state.recurring_investments)"
    desc: A recurring investment for VOO is active
  - expr: "any(ri.frequency == 'monthly' and ri.amount == 200\n    for ri in state.recurring_investments\n\
      \    if ri.status == 'active')"
    desc: The active recurring investment has monthly frequency and $200 amount
  negative_checks:
  - expr: "len([ri for ri in state.recurring_investments\n    if ri.status == 'active'\
      \ and ri.symbol != 'VOO']) == 0"
    desc: No recurring investments were created for symbols other than VOO
    penalty: 0.25
secondary_primitives: []
