task_id: pp_respond_to_provider
env_id: patient_portal
title: Review Provider Message and Schedule Follow-Up
instruction_template: Your PCP sent you a message about adjusting your blood pressure
  medication. Read the message, then schedule exactly one PCP follow-up appointment
  using the next available PCP slot. Use the appointment reason exactly "Blood pressure
  medication adjustment follow-up". Do not reply and do not send any messages.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- grounding
start_path: /messages
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: message_threads
    params:
      thread_count: 4
      unread_count: 2
      categories:
      - clinical
      - scheduling
      include_billing: true
      body_context:
        type: bp_medication_adjustment
    outputs:
    - thread_ids
    - unread_msg_ids
    - all_msg_ids
  targets:
    pcp_id: '{output.pcp_id}'
    all_msg_ids: '{output.all_msg_ids}'
    thread_ids: '{output.thread_ids}'
eval:
  source: server_state
  checks:
  - expr: "any(\n  m.from_type == 'provider'\n  and m.provider_id == '{target.pcp_id}'\n\
      \  and m.subject == 'Blood Pressure Medication Adjustment'\n  and m.id in {target.all_msg_ids}\n\
      \  and state.get_message(m.id) is not None\n  and state.get_message(m.id).is_read\n\
      \  for m in state.messages\n)"
    desc: The PCP medication-adjustment message was read
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'Blood pressure\
      \ medication adjustment follow-up'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one PCP follow-up appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'Blood pressure medication adjustment follow-up'\n  and a.datetime\
      \ == min(\n    slot['datetime']\n    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The PCP follow-up used the next available PCP slot
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in {target.all_msg_ids}\n]) == 0"
    desc: Agent did not send any patient replies or new messages
    penalty: 0.2
secondary_primitives: []
