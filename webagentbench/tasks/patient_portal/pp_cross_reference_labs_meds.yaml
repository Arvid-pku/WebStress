task_id: pp_cross_reference_labs_meds
env_id: patient_portal
title: Cross-Reference Labs and Medications
instruction_template: Review your active medications and recent lab results. In this
  seed there is an interacting medication pair and an abnormal lab result, so schedule
  exactly one follow-up appointment with your PCP at the next available slot. Use
  the appointment reason exactly "Drug interaction and abnormal lab review". Do not
  send any messages and do not discontinue any medications.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- state_tracking
start_path: /medications
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Atrial Fibrillation
      - Hyperlipidemia
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
      interaction_pair: true
    outputs:
    - active_rx_ids
    - interacting_rx_ids
    - interacting_medications
  - use: lab_results_panel
    params:
      resulted_count: 5
      pending_count: 1
      abnormal_count: 1
    outputs:
    - resulted_lab_ids
    - pending_lab_ids
    - abnormal_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    interacting_rx_ids: '{output.interacting_rx_ids}'
    interacting_medications: '{output.interacting_medications}'
    resulted_lab_ids: '{output.resulted_lab_ids}'
    pending_lab_ids: '{output.pending_lab_ids}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'Drug interaction\
      \ and abnormal lab review'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one PCP review appointment was scheduled for the interaction-plus-lab
      finding
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'Drug interaction and abnormal lab review'\n  and a.datetime\
      \ == min(\n    slot['datetime']\n    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The PCP review used the next available PCP slot
  negative_checks:
  - expr: "not any(r.status == 'discontinued'\n        and r.id in {target.interacting_rx_ids}\n\
      \        for r in state.prescriptions)"
    desc: Agent did not discontinue interacting medications
    penalty: 0.3
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
