task_id: pp_provider_transition
env_id: patient_portal
title: Provider Transition
instruction_template: 'Establish endocrinology follow-up without using messages: 1)
  Find the endocrinologist in the directory who is accepting new patients, 2) Use
  the approved endocrinology referral to schedule one appointment with that endocrinologist
  in the next available slot, 3) Use the appointment reason exactly "Endocrinology
  transfer of care". Do not cancel any existing appointments and do not modify any
  prescriptions.'
difficulty: expert
time_limit_seconds: 420
expected_steps: 24
primary_primitives:
- planning
start_path: /appointments
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      - Hypothyroidism
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - endocrinology
      - cardiology
      - dermatology
      - billing
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: prescription_cabinet
    params:
      active_count: 4
    outputs:
    - active_rx_ids
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 1
      must_have_specialties:
      - endocrinology
    outputs:
    - approved_ref_ids
    - pending_ref_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  targets:
    endo_provider_ids: '{output.providers_by_specialty.endocrinology}'
    approved_ref_ids: '{output.approved_ref_ids}'
    upcoming_ids: '{output.upcoming_ids}'
    active_rx_ids: '{output.active_rx_ids}'
canonical_diff:
  # Positive signal: schedule exactly one new Appointment with an
  # endocrinologist who is accepting_new, linked to one of the approved
  # endocrinology referrals, with the exact required reason string, booked
  # into the earliest available slot offered by that endocrinologist.
  create:
    - entity: Appointment
      desc: "Schedule one transfer-of-care endocrinology appointment at the next available slot across endocrinologists accepting new patients, linked to the approved endocrinology referral"
      properties:
        status: {eq: "scheduled"}
        reason: {eq: "Endocrinology transfer of care"}
        provider_id:
          expr: >
            x in target['endo_provider_ids']
            and any(p.id == x and p.accepting_new and p.specialty == 'endocrinology' for p in initial.providers)
        linked_referral_id:
          expr: >
            x is not None
            and x in target['approved_ref_ids']
            and any(r.id == x and r.status == 'approved' and r.to_specialty == 'endocrinology' for r in initial.referrals)
        datetime:
          expr: >
            x == min(
              s.datetime
              for p in initial.providers
              if p.id in target['endo_provider_ids']
              and p.accepting_new
              and p.specialty == 'endocrinology'
              for s in p.available_slots
            )
        type: {any: true}
        notes: {any: true}
        pre_auth_status: {any: true}
        booked_at: {any: true}
        location: {any: true}
  invariant:
    # Existing appointments (upcoming + completed history) must not be
    # cancelled or modified. The new create above is scoped to IDs not in
    # the initial snapshot, so a filter over initial.appointments ids is
    # equivalent to "preserve every pre-existing appointment".
    - collection: state.appointments
      filter: "a.id in {x.id for x in initial.appointments}"
      preserve: ALL
    # Prescriptions untouched (explicit instruction).
    - collection: state.prescriptions
      preserve: ALL
    # No new patient messages ("without using messages").
    - collection: state.messages
      preserve: ALL
    # Referrals remain as seeded; the approved endocrinology referral stays
    # approved and no new referrals are created.
    - collection: state.referrals
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
  named_invariants:
    - name: "Agent did not cancel or modify any existing appointments"
      ref: invariant[0]
      severity: high
    - name: "Agent did not modify any prescriptions"
      ref: invariant[1]
      severity: high
    - name: "Agent did not send any messages"
      ref: invariant[2]
      severity: high
    - name: "Agent did not create or modify referrals"
      ref: invariant[3]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[5]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
secondary_primitives: []
