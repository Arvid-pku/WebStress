task_id: pp_provider_transition
env_id: patient_portal
title: Provider Transition
instruction_template: 'Establish endocrinology follow-up without using messages: 1)
  Find the endocrinologist in the directory who is accepting new patients, 2) Use
  the approved endocrinology referral to schedule one appointment with that endocrinologist
  in the next available slot, 3) Use the appointment reason exactly "Endocrinology
  transfer of care". Do not cancel any existing appointments and do not modify any
  prescriptions.'
difficulty: expert
time_limit_seconds: 420
expected_steps: 24
primary_primitives:
- planning
start_path: /appointments
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      - Hypothyroidism
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - endocrinology
      - cardiology
      - dermatology
      - billing
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: prescription_cabinet
    params:
      active_count: 4
    outputs:
    - active_rx_ids
  - use: referral_chain
    params:
      approved_count: 1
      pending_count: 1
      must_have_specialties:
      - endocrinology
    outputs:
    - approved_ref_ids
    - pending_ref_ids
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  targets:
    endo_provider_ids: '{output.providers_by_specialty.endocrinology}'
    approved_ref_ids: '{output.approved_ref_ids}'
    upcoming_ids: '{output.upcoming_ids}'
    active_rx_ids: '{output.active_rx_ids}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n]) == 1"
    desc: Exactly one new appointment was scheduled
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n  and a.provider_id in {target.endo_provider_ids}\n\
      \  and state.get_provider(a.provider_id) is not None\n  and state.get_provider(a.provider_id).accepting_new\n\
      \  and a.reason == 'Endocrinology transfer of care'\n  and a.linked_referral_id\
      \ in {target.approved_ref_ids}\n  and state.get_referral(a.linked_referral_id)\
      \ is not None\n  and state.get_referral(a.linked_referral_id).status == 'approved'\n\
      \  and state.get_referral(a.linked_referral_id).to_specialty == 'endocrinology'\n\
      ]) == 1"
    desc: A transfer-of-care endocrinology appointment was scheduled with the approved
      endocrinology referral
  - expr: "any(\n  a.status == 'scheduled'\n  and a.id not in {target.upcoming_ids}\n\
      \  and a.provider_id in {target.endo_provider_ids}\n  and a.reason == 'Endocrinology\
      \ transfer of care'\n  and a.datetime.isoformat() <= min(\n    slot.datetime.isoformat()\n\
      \    for slot in state.get_provider(a.provider_id).available_slots\n  )\n  for\
      \ a in state.appointments\n)"
    desc: The transfer-of-care appointment used the next available endocrinology slot
  negative_checks:
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
  - expr: "all(\n  rx.status == state._initial_snapshot['prescriptions'][rx.id]['status']\n\
      \  for rx in state.prescriptions\n  if rx.id in state._initial_snapshot.get('prescriptions',\
      \ {})\n  and rx.id in {target.active_rx_ids}\n)"
    desc: Active prescriptions were not modified
    penalty: 0.25
  - expr: "not any(\n  m.from_type == 'patient'\n  and m.id not in state._initial_snapshot.get('messages',\
      \ {})\n  for m in state.messages\n)"
    desc: No new patient messages were sent
    penalty: 0.15
  - expr: "all(\n  state.get_referral(rid) is not None\n  and state.get_referral(rid).status\
      \ == 'approved'\n  for rid in {target.approved_ref_ids}\n)"
    desc: The approved endocrinology referral remained approved
    penalty: 0.2
secondary_primitives: []
