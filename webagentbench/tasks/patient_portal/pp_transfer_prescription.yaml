task_id: pp_transfer_prescription
env_id: patient_portal
title: Transfer Prescription to Pharmacy
instruction_template: Transfer your Metformin prescription from its current pharmacy
  to the Walgreens pharmacy already in your pharmacy list.
difficulty: medium
time_limit_seconds: 180
expected_steps: 8
primary_primitives:
- grounding
start_path: /medications
seed:
  distractors: 6
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - endocrinology
      - cardiology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 3
      must_include_name:
      - Walgreens
      target_pharmacy_name: Walgreens
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
    - target_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
      zero_refill_count: 0
      target_medication_name: Metformin 500mg
      target_exclude_pharmacy_name: Walgreens
    outputs:
    - active_rx_ids
    - target_rx_id
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    pharmacy_ids: '{output.pharmacy_ids}'
    default_pharmacy_id: '{output.default_pharmacy_id}'
    target_rx_id: '{output.target_rx_id}'
    target_pharmacy_id: '{output.target_pharmacy_id}'
canonical_diff:
  update:
    - entity: Prescription
      desc: "Transfer Metformin to the Walgreens pharmacy"
      where:
        id: {expr: "x == target['target_rx_id']"}
      changes:
        pharmacy_id: {expr: "x == target['target_pharmacy_id']"}
  invariant:
    - collection: state.prescriptions
      filter: "a.id != target['target_rx_id']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not transfer or modify other prescriptions"
      ref: invariant[0]
      severity: high
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[4]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[6]
      severity: high
secondary_primitives: []
