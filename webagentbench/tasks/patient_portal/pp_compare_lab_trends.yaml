task_id: pp_compare_lab_trends
env_id: patient_portal
title: Compare Lab Results Over Time
instruction_template: Compare your two most recent HbA1c results. In this seed, the
  most recent pair is improving, so schedule exactly one follow-up appointment with
  your PCP at the next available slot. Use the appointment reason exactly "HbA1c trend
  review". Do not send any messages.
difficulty: medium
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- state_tracking
start_path: /labs
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - endocrinology
      - cardiology
      - billing
      - admin
      must_include:
      - pcp
      - endocrinology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: lab_results_panel
    params:
      resulted_count: 4
      pending_count: 1
      abnormal_count: 0
      trend_test: HbA1c
      trend_values:
      - '7.8'
      - '7.4'
      - '7.1'
    outputs:
    - resulted_lab_ids
    - pending_lab_ids
    - trend_lab_ids
    - trend_test_name
  targets:
    pcp_id: '{output.pcp_id}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'HbA1c trend review'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n]) == 1"
    desc: Exactly one new PCP follow-up appointment was scheduled with the required
      reason
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'HbA1c trend review'\n  and a.datetime == min(\n    slot['datetime']\n\
      \    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The PCP follow-up used the next available PCP slot
  - expr: "len([\n  a for a in state.appointments\n  if a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Agent created exactly one new appointment
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
