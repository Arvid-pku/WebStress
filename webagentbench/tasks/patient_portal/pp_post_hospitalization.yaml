task_id: pp_post_hospitalization
env_id: patient_portal
title: Post-Hospitalization Follow-Up
instruction_template: 'You were recently discharged from the hospital. Complete the
  following post-discharge tasks: 1) Schedule exactly one PCP follow-up appointment
  using the next available PCP slot with reason "Post-discharge PCP follow-up", 2)
  Read the discharge summary message in your inbox, 3) Because the discharge summary
  in this seed mentions a specialist follow-up, schedule exactly one specialist appointment
  with reason "Post-discharge specialist follow-up". Do not send any messages and
  do not modify any prescriptions.'
difficulty: expert
time_limit_seconds: 480
expected_steps: 35
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Type 2 Diabetes
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - orthopedics
      - billing
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
    outputs:
    - active_rx_ids
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 3
    outputs:
    - upcoming_ids
    - completed_ids
  - use: message_threads
    params:
      thread_count: 3
      unread_count: 2
      categories:
      - clinical
      body_context:
        type: discharge_summary
        provider_selector: most_recent_completed
        include_referral_mention: true
    outputs:
    - thread_ids
    - unread_msg_ids
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    upcoming_ids: '{output.upcoming_ids}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.provider_id == '{target.pcp_id}'\n\
      \  and a.status == 'scheduled'\n  and a.reason == 'Post-discharge PCP follow-up'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n]) == 1"
    desc: Exactly one PCP follow-up appointment was scheduled
  - expr: "any(\n  m.from_type == 'provider'\n  and m.subject == 'Discharge Summary'\n\
      \  and m.id in state._initial_snapshot.get('messages', {})\n  and state.get_message(m.id)\
      \ is not None\n  and state.get_message(m.id).is_read\n  for m in state.messages\n\
      )"
    desc: The discharge summary message was read
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.reason == 'Post-discharge specialist follow-up'\n  and a.id not in\
      \ state._initial_snapshot.get('appointments', {})\n  and state.get_provider(a.provider_id)\
      \ is not None\n  and any(\n    specialty in next(\n      msg.body.lower()\n\
      \      for msg in state.messages\n      if msg.from_type == 'provider'\n   \
      \   and msg.subject == 'Discharge Summary'\n    )\n    for specialty in ['cardiology',\
      \ 'endocrinology', 'orthopedics', 'neurology']\n    if state.get_provider(a.provider_id).specialty\
      \ == specialty\n  )\n]) == 1"
    desc: Exactly one specialist follow-up was scheduled for the specialty mentioned
      in the discharge summary
  - expr: "all(rx.status == 'active'\n    for rx in state.prescriptions\n    if rx.id\
      \ in {target.active_rx_ids})"
    desc: Active prescriptions were not modified
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
secondary_primitives: []
