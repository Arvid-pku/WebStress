task_id: pp_coordinate_rx_transfer
env_id: patient_portal
title: Coordinate Pharmacy Transfer
instruction_template: Your default pharmacy is closing. Transfer all of your active
  prescriptions to another retail pharmacy in your pharmacy list, then update that
  pharmacy as your new default.
difficulty: hard
time_limit_seconds: 300
expected_steps: 18
primary_primitives:
- backtracking
start_path: /medications
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Type 2 Diabetes
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
      include_mail_order: true
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
    - mail_order_pharmacy_id
    - new_default_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 2
      zero_refill_count: 0
      active_at_default_only: true
    outputs:
    - active_rx_ids
  targets:
    pcp_id: '{output.pcp_id}'
    active_rx_ids: '{output.active_rx_ids}'
    pharmacy_ids: '{output.pharmacy_ids}'
    default_pharmacy_id: '{output.default_pharmacy_id}'
    mail_order_pharmacy_id: '{output.mail_order_pharmacy_id}'
    new_default_pharmacy_id: '{output.new_default_pharmacy_id}'
canonical_diff:
  update:
    - entity: Prescription
      desc: "Transfer each active prescription to the new retail pharmacy"
      bijection:
        over: "target['active_rx_ids']"
        variable: v
      where:
        id: {expr: "x == v"}
      changes:
        pharmacy_id: {expr: "x == target['new_default_pharmacy_id']"}
    - entity: Pharmacy
      desc: "Clear default flag from the closing pharmacy"
      where:
        id: {expr: "x == target['default_pharmacy_id']"}
      changes:
        is_default: {eq: false}
    - entity: Pharmacy
      desc: "Set the new retail pharmacy as the default"
      where:
        id: {expr: "x == target['new_default_pharmacy_id']"}
      changes:
        is_default: {eq: true}
  invariant:
    - collection: state.prescriptions
      filter: "a.id not in target['active_rx_ids']"
      preserve: ALL
    - collection: state.pharmacies
      filter: "a.id != target['default_pharmacy_id'] and a.id != target['new_default_pharmacy_id']"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify non-active prescriptions (expired/discontinued)"
      ref: invariant[0]
      severity: high
    - name: "Agent did not flip default flag on the mail-order or any other pharmacy"
      ref: invariant[1]
      severity: high
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not send unsolicited messages"
      ref: invariant[5]
      severity: medium
    - name: "Agent did not touch insurance claims"
      ref: invariant[6]
      severity: critical
    - name: "Agent did not create or modify referrals"
      ref: invariant[7]
      severity: high
secondary_primitives: []
