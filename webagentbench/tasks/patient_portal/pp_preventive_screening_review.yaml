task_id: pp_preventive_screening_review
env_id: patient_portal
title: Identify Overdue Screenings
instruction_template: Review your applicable screenings list in your profile. For
  every screening where the next due date has already passed, schedule exactly one
  appointment. Use the screening name itself as the appointment reason exactly as
  shown in the profile. Do not send any messages.
difficulty: hard
time_limit_seconds: 300
expected_steps: 15
primary_primitives:
- planning
start_path: /profile
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Type 2 Diabetes
      insurance_tier: standard
      overdue_screening_count: 2
    outputs:
    - pcp_id
    - pcp_name
    - applicable_screening_names
    - overdue_screening_names
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  targets:
    pcp_id: '{output.pcp_id}'
    applicable_screening_names: '{output.applicable_screening_names}'
    overdue_screening_names: '{output.overdue_screening_names}'
canonical_diff:
  create:
    - entity: Appointment
      desc: "Schedule one appointment per overdue screening; reason = screening name"
      bijection:
        over: "target['overdue_screening_names']"
        variable: v
      properties:
        status: {eq: "scheduled"}
        provider_id:
          expr: "x == target['pcp_id']"
        reason:
          expr: "x == v"
  invariant:
    - collection: state.prescriptions
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not modify prescriptions"
      ref: invariant[0]
      severity: high
    - name: "Agent did not send any messages"
      ref: invariant[1]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[2]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[3]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[4]
      severity: critical
    - name: "Agent did not touch referrals"
      ref: invariant[5]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[6]
      severity: medium
    - name: "Agent did not schedule more appointments than overdue screenings"
      ref: create[0]
      severity: medium
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n]) == len([\n\
      \  screening for screening in state.patient.applicable_screenings\n  if screening.next_due\
      \ is not None\n  and screening.next_due < state.created_at.date()\n])"
    desc: Exactly one appointment was scheduled for each overdue screening
  - expr: "sorted(\n  a.reason\n  for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n) == sorted(\n\
      \  screening.screening_name\n  for screening in state.patient.applicable_screenings\n\
      \  if screening.next_due is not None\n  and screening.next_due < state.created_at.date()\n\
      )"
    desc: Every new appointment uses the exact overdue screening name as its reason
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
  - expr: "not any(\n  m.from_type == 'patient'\n  and any(\n    screening.screening_name.lower()\
      \ in m.body.lower()\n    for screening in state.patient.applicable_screenings\n\
      \    if screening.next_due is not None\n    and screening.next_due < state.created_at.date()\n\
      \  )\n  and m.id not in state._initial_snapshot.get('messages', {})\n  for m\
      \ in state.messages\n)"
    desc: Agent did not message about overdue screenings instead of scheduling them
    penalty: 0.1
  - expr: "not any(\n  a.status == 'scheduled'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n  and a.reason not in [\n    screening.screening_name\n    for screening\
      \ in state.patient.applicable_screenings\n    if screening.next_due is not None\n\
      \    and screening.next_due < state.created_at.date()\n  ]\n  for a in state.appointments\n\
      )"
    desc: Agent did not schedule appointments for screenings that were not overdue
    penalty: 0.15
secondary_primitives: []
