task_id: pp_read_lab_result
env_id: patient_portal
title: Check Lab Result and Schedule PCP Follow-Up
instruction_template: Review your most recent LDL Cholesterol result. In this seed
  it is above 130 mg/dL, so schedule exactly one follow-up appointment with your PCP
  at the next available slot. Use the appointment reason exactly "LDL result follow-up".
  Do not send any messages.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
- grounding
start_path: /labs
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - High Cholesterol
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - cardiology
      must_include:
      - pcp
    outputs:
    - provider_ids
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: lab_results_panel
    params:
      resulted_count: 3
      abnormal_count: 1
      trend_test: LDL Cholesterol
      trend_values:
      - '158'
    outputs:
    - resulted_lab_ids
    - abnormal_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    pcp_name: '{output.pcp_name}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id == '{target.pcp_id}'\n  and a.reason == 'LDL result follow-up'\n\
      \  and a.id not in state._initial_snapshot.get('appointments', {})\n]) == 1"
    desc: Exactly one PCP follow-up appointment was scheduled with the required reason
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and a.reason == 'LDL result follow-up'\n  and a.datetime == min(\n    slot['datetime']\n\
      \    for slot in state._initial_snapshot['providers']['{target.pcp_id}']['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The follow-up used the next available PCP slot
  - expr: "len([\n  a for a in state.appointments\n  if a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Agent created exactly one new appointment
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.2
secondary_primitives: []
