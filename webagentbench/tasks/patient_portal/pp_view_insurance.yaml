task_id: pp_view_insurance
env_id: patient_portal
title: View Insurance Card Details
instruction_template: "Find your insurance member ID and group number and report them."
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
  - grounding
start_path: /profile

seed:
  distractors: 5
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: standard
      outputs: [pcp_id, member_id, insurance_plan_name]
    - use: provider_directory
      params:
        count: 3
        specialties: ["pcp"]
        must_include: ["pcp"]
      outputs: [provider_ids]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
  targets:
    member_id: "{output.member_id}"
    plan_name: "{output.insurance_plan_name}"

eval:
  source: server_state
  checks:
    - expr: >-
        any(m.from_type == 'patient'
            and '{target.member_id}' in m.body
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent reported the correct member ID in a message
    - expr: >-
        any(m.from_type == 'patient'
            and '{target.plan_name}' in m.body
            and m.id not in state._initial_snapshot.get('messages', {})
            for m in state.messages)
      desc: Agent reported the correct plan name in a message
  negative_checks:
    - expr: >-
        not any(a.id not in state._initial_snapshot.get('appointments', {})
                for a in state.appointments)
      desc: Agent did not create any appointments for an information-only task
      penalty: 0.15
