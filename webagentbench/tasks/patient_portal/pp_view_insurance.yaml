task_id: pp_view_insurance
env_id: patient_portal
title: View Insurance Card Details
instruction_template: Open your profile and schedule exactly one Patient Services
  appointment using the next available admin slot. Use the appointment reason exactly
  "Insurance card verification". Do not send any messages.
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- backtracking
start_path: /profile
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - member_id
    - group_number
  - use: provider_directory
    params:
      count: 3
      specialties:
      - pcp
      - admin
      must_include:
      - pcp
      - admin
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  targets:
    admin_provider_ids: '{output.providers_by_specialty.admin}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.provider_id in {target.admin_provider_ids}\n  and a.reason == 'Insurance\
      \ card verification'\n  and a.id not in state._initial_snapshot.get('appointments',\
      \ {})\n]) == 1"
    desc: Exactly one Patient Services verification appointment was scheduled
  - expr: "any(\n  a.status == 'scheduled'\n  and a.provider_id in {target.admin_provider_ids}\n\
      \  and a.reason == 'Insurance card verification'\n  and a.datetime == min(\n\
      \    slot['datetime']\n    for provider_id in {target.admin_provider_ids}\n\
      \    for slot in state._initial_snapshot['providers'][provider_id]['available_slots']\n\
      \  )\n  and a.id not in state._initial_snapshot.get('appointments', {})\n  for\
      \ a in state.appointments\n)"
    desc: The verification appointment used the next available admin slot
  negative_checks:
  - expr: "len([\n  m for m in state.messages\n  if m.from_type == 'patient'\n  and\
      \ m.id not in state._initial_snapshot.get('messages', {})\n]) == 0"
    desc: Agent did not send any patient messages
    penalty: 0.15
secondary_primitives: []
