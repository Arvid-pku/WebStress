task_id: pp_setup_telehealth
env_id: patient_portal
title: Convert to Telehealth
instruction_template: Your next upcoming in-person appointment needs to be converted
  to telehealth. Cancel the current in-person appointment and reschedule it as a telehealth
  visit with the same provider at the closest available time.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
- backtracking
start_path: /appointments
seed:
  distractors: 6
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 5
      specialties:
      - pcp
      - cardiology
      - dermatology
      - orthopedics
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 3
      completed_count: 2
    outputs:
    - upcoming_ids
    - next_appointment_id
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
    next_appointment_id: '{output.next_appointment_id}'
eval:
  source: server_state
  checks:
  - expr: state.get_appointment('{target.next_appointment_id}') is not None and state.get_appointment('{target.next_appointment_id}').status
      == 'cancelled'
    desc: The next upcoming in-person appointment was cancelled
  - expr: "any(a.type == 'telehealth'\n    and a.status == 'scheduled'\n    and a.id\
      \ not in {target.upcoming_ids}\n    and a.provider_id == state._initial_snapshot['appointments']['{target.next_appointment_id}']['provider_id']\n\
      \    for a in state.appointments)"
    desc: A new telehealth appointment was scheduled with the same provider
  - expr: "len([a for a in state.appointments\n     if a.type == 'telehealth'\n  \
      \   and a.status == 'scheduled'\n     and a.id not in {target.upcoming_ids}])\
      \ >= 1"
    desc: At least one new telehealth appointment exists
  negative_checks:
  - expr: "not any(a.type == 'in-person'\n        and a.status == 'scheduled'\n  \
      \      and a.id not in {target.upcoming_ids}\n        for a in state.appointments)"
    desc: Agent did not schedule another in-person appointment
    penalty: 0.2
  - expr: "not any(a.id in {target.upcoming_ids}\n        and a.id != '{target.next_appointment_id}'\n\
      \        and a.status == 'cancelled'\n        for a in state.appointments)"
    desc: Agent did not cancel a different upcoming appointment
    penalty: 0.25
secondary_primitives: []
