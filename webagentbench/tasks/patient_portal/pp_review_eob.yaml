task_id: pp_review_eob
env_id: patient_portal
title: Review EOB and Act on Balance
instruction_template: >-
  Review the Explanation of Benefits for your most recent approved claim. If
  your patient responsibility exceeds $200, message the billing department
  asking about payment plan options. Use the billing message category.
difficulty: medium
time_limit_seconds: 200
expected_steps: 10
primary_primitives:
  - grounding
  - planning
start_path: /billing

seed:
  distractors: 8
  steps:
    - use: patient_profile
      params:
        conditions: ["Hypertension"]
        insurance_tier: basic
      outputs: [pcp_id, pcp_name]
    - use: provider_directory
      params:
        count: 5
        specialties: ["pcp", "cardiology", "orthopedics", "billing", "admin"]
        must_include: ["pcp", "billing"]
      outputs: [provider_ids, providers_by_specialty]
    - use: pharmacy_list
      params:
        count: 2
      outputs: [default_pharmacy_id]
    - use: appointment_history
      params:
        upcoming_count: 1
        completed_count: 3
      outputs: [completed_ids]
    - use: insurance_claims
      params:
        approved_count: 2
        denied_count: 1
        processing_count: 1
        with_eob: true
      outputs: [approved_claim_ids, denied_claim_ids, total_patient_responsibility]
    - use: message_threads
      params:
        thread_count: 2
        unread_count: 1
        categories: ["clinical"]
      outputs: [all_msg_ids]
  targets:
    pcp_id: "{output.pcp_id}"
    approved_claim_ids: "{output.approved_claim_ids}"
    denied_claim_ids: "{output.denied_claim_ids}"
    all_msg_ids: "{output.all_msg_ids}"
    providers_by_specialty: "{output.providers_by_specialty}"

eval:
  source: server_state
  checks:
    - expr: >-
        (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] <= 200
          and len([
            m for m in state.messages
            if m.from_type == 'patient'
            and m.id not in {target.all_msg_ids}
          ]) == 0
        ) or (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] > 200
          and len([
            m for m in state.messages
            if m.from_type == 'patient'
            and m.category == 'billing'
            and state.get_provider(m.provider_id) is not None
            and state.get_provider(m.provider_id).specialty == 'billing'
            and m.id not in {target.all_msg_ids}
          ]) == 1
        )
      desc: Agent followed the threshold rule for the most recent approved claim
    - expr: >-
        (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] <= 200
        ) or all(
          max(
            {target.approved_claim_ids},
            key=lambda cid: (
              state._initial_snapshot['claims'][cid]['service_date'],
              cid,
            ),
          ) in m.body
          for m in state.messages
          if m.from_type == 'patient'
          and m.category == 'billing'
          and state.get_provider(m.provider_id) is not None
          and state.get_provider(m.provider_id).specialty == 'billing'
          and m.id not in {target.all_msg_ids}
        )
      desc: Any required message references the exact target claim ID
    - expr: >-
        all(
          c.status == state._initial_snapshot['claims'][c.id]['status']
          and c.patient_responsibility == state._initial_snapshot['claims'][c.id]['patient_responsibility']
          for c in state.claims
          if c.id in state._initial_snapshot.get('claims', {})
        )
      desc: Reviewing the EOB did not mutate claim state
  negative_checks:
    - expr: >-
        not any(m.from_type == 'patient'
                and m.category == 'clinical'
                and m.id not in {target.all_msg_ids}
                for m in state.messages)
      desc: Agent did not misroute billing query as clinical message
      penalty: 0.15
    - expr: >-
        (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] <= 200
          and len([
            m for m in state.messages
            if m.from_type == 'patient'
            and m.id not in {target.all_msg_ids}
          ]) == 0
        ) or (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] > 200
          and len([
            m for m in state.messages
            if m.from_type == 'patient'
            and m.id not in {target.all_msg_ids}
          ]) == 1
        )
      desc: Agent did not send extra patient messages beyond the threshold-driven action
      penalty: 0.20
    - expr: >-
        (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] <= 200
        ) or not any(
          m.from_type == 'patient'
          and m.id not in {target.all_msg_ids}
          and any(
              cid != max(
                {target.approved_claim_ids},
                key=lambda target_cid: (
                  state._initial_snapshot['claims'][target_cid]['service_date'],
                  target_cid,
                ),
              )
              and cid in m.body
              for cid in state._initial_snapshot['claims']
          )
          for m in state.messages
        )
      desc: Agent did not reference a different claim in the billing question
      penalty: 0.20
    - expr: >-
        (
          state._initial_snapshot['claims'][
            max(
              {target.approved_claim_ids},
              key=lambda cid: (
                state._initial_snapshot['claims'][cid]['service_date'],
                cid,
              ),
            )
          ]['patient_responsibility'] <= 200
        ) or not any(
          m.from_type == 'patient'
          and m.id not in {target.all_msg_ids}
          and (
            state.get_provider(m.provider_id) is None
            or state.get_provider(m.provider_id).specialty != 'billing'
          )
          for m in state.messages
        )
      desc: Agent did not route the payment-plan question to a non-billing provider
      penalty: 0.15
