task_id: pp_schedule_annual_physical
env_id: patient_portal
title: Schedule Labs Before Physical
instruction_template: Schedule your annual physical with your PCP. Before the physical,
  schedule pre-visit lab work at least 3 days prior. Both appointments must be in-person
  visits.
difficulty: hard
time_limit_seconds: 360
expected_steps: 18
primary_primitives:
- planning
start_path: /appointments
seed:
  distractors: 10
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Hyperlipidemia
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - dermatology
      - billing
      - admin
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: appointment_history
    params:
      upcoming_count: 2
      completed_count: 2
    outputs:
    - upcoming_ids
  - use: lab_results_panel
    params:
      resulted_count: 3
      pending_count: 0
      abnormal_count: 0
    outputs:
    - resulted_lab_ids
  targets:
    pcp_id: '{output.pcp_id}'
    upcoming_ids: '{output.upcoming_ids}'
eval:
  source: server_state
  checks:
  - expr: "len([a for a in state.appointments\n     if a.status == 'scheduled'\n \
      \    and a.id not in {target.upcoming_ids}]) >= 2"
    desc: At least two new appointments were scheduled
  - expr: "any(a.status == 'scheduled'\n    and a.provider_id == '{target.pcp_id}'\n\
      \    and a.type == 'in-person'\n    and a.id not in {target.upcoming_ids}\n\
      \    for a in state.appointments)"
    desc: A new in-person PCP appointment (physical) was scheduled
  - expr: "any(a.status == 'scheduled'\n    and a.type == 'in-person'\n    and a.id\
      \ not in {target.upcoming_ids}\n    and any(word in a.reason.lower() for word\
      \ in ('lab', 'blood', 'pre-visit'))\n    for a in state.appointments)"
    desc: A lab work appointment was scheduled with appropriate reason
  - expr: "all(a.type == 'in-person'\n    for a in state.appointments\n    if a.status\
      \ == 'scheduled'\n    and a.id not in {target.upcoming_ids})"
    desc: All new appointments are in-person
  - expr: "(\n  lambda pcp_dt=next(\n    (a.datetime for a in state.appointments\n\
      \    if a.status == 'scheduled'\n    and a.provider_id == '{target.pcp_id}'\n\
      \    and a.id not in {target.upcoming_ids}\n    and not any(word in a.reason.lower()\
      \ for word in ('lab', 'blood', 'pre-visit'))),\n    None,\n  ),\n  lab_dt=next(\n\
      \    (a.datetime for a in state.appointments\n    if a.status == 'scheduled'\n\
      \    and a.id not in {target.upcoming_ids}\n    and any(word in a.reason.lower()\
      \ for word in ('lab', 'blood', 'pre-visit'))),\n    None,\n  ):\n  pcp_dt is\
      \ not None and lab_dt is not None\n  and (pcp_dt - lab_dt).days >= 3\n)()"
    desc: Lab work is scheduled at least 3 days before the physical
  negative_checks:
  - expr: "not any(a.type == 'telehealth'\n        and a.status == 'scheduled'\n \
      \       and a.id not in {target.upcoming_ids}\n        for a in state.appointments)"
    desc: Agent did not schedule telehealth visits instead of in-person
    penalty: 0.2
  - expr: "not any(a.status == 'cancelled'\n        and a.id in {target.upcoming_ids}\n\
      \        for a in state.appointments)"
    desc: Agent did not cancel existing appointments
    penalty: 0.15
secondary_primitives: []
