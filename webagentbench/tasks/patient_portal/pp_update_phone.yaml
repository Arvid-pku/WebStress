task_id: pp_update_phone
env_id: patient_portal
title: Update Phone Number
instruction_template: Update your phone number to {target.new_phone}.
difficulty: easy
time_limit_seconds: 90
expected_steps: 4
primary_primitives:
- verification
start_path: /profile
seed:
  distractors: 5
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      insurance_tier: standard
    outputs:
    - pcp_id
  - use: provider_directory
    params:
      count: 3
      specialties:
      - pcp
      must_include:
      - pcp
    outputs:
    - provider_ids
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  targets:
    new_phone: (555) 867-5309
canonical_diff:
  # NOTE: `patient` is a SINGLETON on PatientPortalState, not a list, so
  # compute_diff (which only iterates list fields) cannot see the phone-field
  # change. This task therefore has no positive structural entry — the
  # positive signal is a `critical`-severity constraint instead. With
  # total_weight==0, score_raw resolves to 1.0 and penalties reduce it; a
  # failing critical constraint deducts 0.3, and passed is False whenever
  # any constraint or invariant fails (via the failures list).
  constraints:
  - desc: Patient phone was updated to the target value
    expr: state.patient.phone == target['new_phone']
    severity: critical
  - desc: Emergency contact phone was not mistakenly changed
    expr: state.patient.emergency_contact.phone == initial.patient.emergency_contact.phone
    severity: high
  - desc: Patient email was not changed
    expr: state.patient.email == initial.patient.email
    severity: high
  - desc: Patient name was not changed
    expr: state.patient.name == initial.patient.name
    severity: medium
  invariant:
  - collection: state.appointments
    preserve: ALL
  - collection: state.prescriptions
    preserve: ALL
  - collection: state.messages
    preserve: ALL
  - collection: state.immunizations
    preserve: ALL
  - collection: state.lab_results
    preserve: ALL
  - collection: state.claims
    preserve: ALL
  - collection: state.referrals
    preserve: ALL
  - collection: state.pharmacies
    preserve: ALL
  - collection: state.providers
    preserve: ALL
  named_invariants:
  - name: Agent did not create, cancel, or modify appointments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify prescriptions
    ref: invariant[1]
    severity: high
  - name: Agent did not send unsolicited messages
    ref: invariant[2]
    severity: medium
  - name: Agent did not modify immunization records
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify lab results
    ref: invariant[4]
    severity: high
  - name: Agent did not touch insurance claims
    ref: invariant[5]
    severity: critical
  - name: Agent did not touch referrals
    ref: invariant[6]
    severity: high
  - name: Agent did not modify pharmacies
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify providers
    ref: invariant[8]
    severity: medium
secondary_primitives: []
