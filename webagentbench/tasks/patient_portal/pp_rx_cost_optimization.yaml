task_id: pp_rx_cost_optimization
env_id: patient_portal
title: Prescription Cost Optimization
instruction_template: Move your active Atorvastatin prescription to the mail-order
  pharmacy already linked to your profile. Do not send any messages, do not request
  a renewal, and do not modify any other prescription.
difficulty: hard
time_limit_seconds: 360
expected_steps: 16
primary_primitives:
- grounding
start_path: /medications
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - High Cholesterol
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 4
      specialties:
      - pcp
      - cardiology
      - billing
      must_include:
      - pcp
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 3
      include_mail_order: true
    outputs:
    - pharmacy_ids
    - default_pharmacy_id
    - mail_order_pharmacy_id
  - use: prescription_cabinet
    params:
      active_count: 4
      expired_count: 1
      target_medication_name: Atorvastatin
      target_exclude_mail_order: true
    outputs:
    - active_rx_ids
    - target_rx_id
  targets:
    active_rx_ids: '{output.active_rx_ids}'
    target_rx_id: '{output.target_rx_id}'
    default_pharmacy_id: '{output.default_pharmacy_id}'
    mail_order_pharmacy_id: '{output.mail_order_pharmacy_id}'
canonical_diff:
  update:
    - entity: Prescription
      desc: "Transfer the target Atorvastatin prescription to the mail-order pharmacy"
      where:
        id: {expr: "x == target['target_rx_id']"}
      changes:
        pharmacy_id: {expr: "x == target['mail_order_pharmacy_id']"}
  invariant:
    - collection: state.prescriptions
      filter: "a.id != target['target_rx_id']"
      preserve: ALL
    - collection: state.messages
      filter: "a.id in {x.id for x in initial.messages}"
      preserve: ALL
    - collection: state.appointments
      preserve: ALL
    - collection: state.immunizations
      preserve: ALL
    - collection: state.lab_results
      preserve: ALL
    - collection: state.claims
      preserve: ALL
    - collection: state.referrals
      preserve: ALL
    - collection: state.pharmacies
      preserve: ALL
  named_invariants:
    - name: "Agent did not transfer, renew, or modify other prescriptions"
      ref: invariant[0]
      severity: critical
    - name: "Agent did not send new messages or modify existing ones"
      ref: invariant[1]
      severity: critical
    - name: "Agent did not create, cancel, or modify appointments"
      ref: invariant[2]
      severity: high
    - name: "Agent did not modify immunization records"
      ref: invariant[3]
      severity: medium
    - name: "Agent did not create or modify lab results"
      ref: invariant[4]
      severity: high
    - name: "Agent did not touch insurance claims"
      ref: invariant[5]
      severity: critical
    - name: "Agent did not create or modify referrals"
      ref: invariant[6]
      severity: high
    - name: "Agent did not modify pharmacies"
      ref: invariant[7]
      severity: medium
secondary_primitives: []
