task_id: pp_complex_scheduling
env_id: patient_portal
title: Sequential Appointment Scheduling
instruction_template: 'Schedule 3 appointments in the correct sequence with required
  spacing: 1) Blood work labs with any available provider (scheduled first), 2) Cardiologist
  appointment at least 5 days after the labs, 3) PCP follow-up at least 3 days after
  the cardiologist visit. All specialist appointments must have an approved referral
  in place. Do not schedule any appointment without the required prerequisites.'
difficulty: expert
time_limit_seconds: 480
expected_steps: 38
primary_primitives:
- planning
start_path: /
seed:
  distractors: 8
  steps:
  - use: patient_profile
    params:
      conditions:
      - Hypertension
      - Coronary Artery Disease
      insurance_tier: standard
    outputs:
    - pcp_id
    - pcp_name
  - use: provider_directory
    params:
      count: 6
      specialties:
      - pcp
      - cardiology
      - endocrinology
      - radiology
      - billing
      must_include:
      - pcp
      - cardiology
    outputs:
    - provider_ids
    - providers_by_specialty
  - use: pharmacy_list
    params:
      count: 2
    outputs:
    - default_pharmacy_id
  - use: referral_chain
    params:
      approved_count: 2
      pending_count: 1
      with_prior_auth: true
      must_have_specialties:
      - cardiology
    outputs:
    - approved_ref_ids
    - prior_auth_ref_id
  - use: appointment_history
    params:
      upcoming_count: 1
      completed_count: 2
    outputs:
    - upcoming_ids
  - use: message_threads
    params:
      thread_count: 2
      unread_count: 1
      categories:
      - clinical
    outputs:
    - thread_ids
  targets:
    pcp_id: '{output.pcp_id}'
    cardio_provider_ids: '{output.providers_by_specialty.cardiology}'
    approved_ref_ids: '{output.approved_ref_ids}'
    upcoming_ids: '{output.upcoming_ids}'
eval:
  source: server_state
  checks:
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n]) == 3"
    desc: Exactly three new appointments were scheduled
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n  and any(word in a.reason.lower()\
      \ for word in ('lab', 'blood'))\n]) == 1"
    desc: Exactly one new lab appointment was scheduled
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n  and state.get_provider(a.provider_id)\
      \ is not None\n  and a.provider_id in {target.cardio_provider_ids}\n  and not\
      \ any(word in a.reason.lower() for word in ('lab', 'blood'))\n]) == 1"
    desc: Exactly one new cardiology appointment was scheduled
  - expr: "len([\n  a for a in state.appointments\n  if a.status == 'scheduled'\n\
      \  and a.id not in {target.upcoming_ids}\n  and a.provider_id == '{target.pcp_id}'\n\
      \  and not any(word in a.reason.lower() for word in ('lab', 'blood'))\n]) ==\
      \ 1"
    desc: Exactly one PCP follow-up appointment was scheduled
  - expr: "(\n  lambda lab_id=next(\n    (a.id for a in state.appointments\n    if\
      \ a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n    and\
      \ any(word in a.reason.lower() for word in ('lab', 'blood'))),\n    None,\n\
      \  ),\n  cardio_id=next(\n    (a.id for a in state.appointments\n    if a.status\
      \ == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n    and state.get_provider(a.provider_id)\
      \ is not None\n    and a.provider_id in {target.cardio_provider_ids}\n    and\
      \ not any(word in a.reason.lower() for word in ('lab', 'blood'))),\n    None,\n\
      \  ),\n  pcp_id=next(\n    (a.id for a in state.appointments\n    if a.status\
      \ == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n    and a.provider_id\
      \ == '{target.pcp_id}'\n    and not any(word in a.reason.lower() for word in\
      \ ('lab', 'blood'))),\n    None,\n  ):\n  lab_id is not None and cardio_id is\
      \ not None and pcp_id is not None\n  and [\n    a.id\n    for a in sorted(\n\
      \      [a for a in state.appointments\n       if a.status == 'scheduled' and\
      \ a.id not in {target.upcoming_ids}],\n      key=lambda a: a.booked_at,\n  \
      \  )\n  ] == [lab_id, cardio_id, pcp_id]\n)()"
    desc: The appointments were created in the required booking order
  - expr: "(\n  lambda lab_dt=next(\n    (a.datetime for a in state.appointments\n\
      \    if a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n\
      \    and any(word in a.reason.lower() for word in ('lab', 'blood'))),\n    None,\n\
      \  ),\n  cardio_dt=next(\n    (a.datetime for a in state.appointments\n    if\
      \ a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n    and\
      \ state.get_provider(a.provider_id) is not None\n    and a.provider_id in {target.cardio_provider_ids}\n\
      \    and not any(word in a.reason.lower() for word in ('lab', 'blood'))),\n\
      \    None,\n  ):\n  lab_dt is not None and cardio_dt is not None\n  and (cardio_dt\
      \ - lab_dt).days >= 5\n)()"
    desc: The cardiology visit was at least 5 days after the labs
  - expr: "(\n  lambda pcp_dt=next(\n    (a.datetime for a in state.appointments\n\
      \    if a.status == 'scheduled'\n    and a.id not in {target.upcoming_ids}\n\
      \    and a.provider_id == '{target.pcp_id}'\n    and not any(word in a.reason.lower()\
      \ for word in ('lab', 'blood'))),\n    None,\n  ),\n  cardio_dt=next(\n    (a.datetime\
      \ for a in state.appointments\n    if a.status == 'scheduled'\n    and a.id\
      \ not in {target.upcoming_ids}\n    and state.get_provider(a.provider_id) is\
      \ not None\n    and a.provider_id in {target.cardio_provider_ids}\n    and not\
      \ any(word in a.reason.lower() for word in ('lab', 'blood'))),\n    None,\n\
      \  ):\n  pcp_dt is not None and cardio_dt is not None\n  and (pcp_dt - cardio_dt).days\
      \ >= 3\n)()"
    desc: The PCP follow-up was at least 3 days after the cardiology visit
  - expr: "all(\n  state.get_referral(a.linked_referral_id) is not None\n  and state.get_referral(a.linked_referral_id).status\
      \ == 'approved'\n  and state.get_referral(a.linked_referral_id).to_specialty\
      \ == state.get_provider(a.provider_id).specialty\n  for a in state.appointments\n\
      \  if a.status == 'scheduled'\n  and a.id not in {target.upcoming_ids}\n  and\
      \ state.get_provider(a.provider_id) is not None\n  and state.get_provider(a.provider_id).specialty\
      \ not in ('pcp', 'billing', 'admin')\n)"
    desc: Every specialist appointment had an approved referral in place
  negative_checks:
  - expr: "all(\n  state.get_appointment(aid) is not None\n  and state.get_appointment(aid).status\
      \ != 'cancelled'\n  for aid in {target.upcoming_ids}\n)"
    desc: Existing appointments were not cancelled
    penalty: 0.2
  - expr: "not any(\n  a.status == 'scheduled'\n  and a.id not in {target.upcoming_ids}\n\
      \  and state.get_provider(a.provider_id) is not None\n  and state.get_provider(a.provider_id).specialty\
      \ not in ('pcp', 'billing', 'admin')\n  and (\n    a.linked_referral_id is None\n\
      \    or state.get_referral(a.linked_referral_id) is None\n    or state.get_referral(a.linked_referral_id).status\
      \ != 'approved'\n    or state.get_provider(a.provider_id).specialty != state.get_referral(a.linked_referral_id).to_specialty\n\
      \  )\n  for a in state.appointments\n)"
    desc: No specialist appointment was scheduled without an approved referral
    penalty: 0.15
secondary_primitives: []
