task_id: lms_view_assignment_feedback
env_id: lms
title: View Assignment Feedback
instruction_template: >-
  Find the graded assignment "{target.assignment_title}" in {target.course_code}
  and report the instructor's feedback to your advisor via a message.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.6
        target_assignment_status: "graded"
      outputs:
        - target_assignment_id
        - target_assignment_title
        - target_course_code
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent at least one message
    - expr: >-
        state.get_assignment('{target.target_assignment_id}').feedback is not None and
        any(state.get_assignment('{target.target_assignment_id}').feedback in m.get('body', '')
            for m in state.sent_messages)
      desc: Message body contains the feedback text
  negative_checks:
    - expr: len(state.sent_messages) <= 2
      desc: Student did not send excessive messages
      penalty: 0.1
