task_id: lms_find_next_deadline
env_id: lms
title: Find Next Upcoming Deadline
instruction_template: >-
  Find the chronologically next upcoming assignment deadline across all your
  courses. Send a message to your advisor with the assignment title and its
  due date.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
  - state_tracking
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
      outputs:
        - assignment_ids
    - use: calendar_events
      params:
        include_recurring: false
      outputs:
        - event_ids
  targets: {}

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent at least one message
    - expr: >-
        len(state.upcoming_deadlines(within_days=60)) == 0 or
        any(state.upcoming_deadlines(within_days=60)[0].title in m.get('body', '')
            for m in state.sent_messages)
      desc: Message contains the title of the next upcoming assignment
  negative_checks:
    - expr: len(state.sent_messages) <= 2
      desc: Student did not send excessive messages
      penalty: 0.1
