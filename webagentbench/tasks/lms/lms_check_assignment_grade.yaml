task_id: lms_check_assignment_grade
env_id: lms
title: Check Assignment Grade
instruction_template: >-
  Navigate to the assignment "{target.assignment_title}" in {target.course_code}
  and report its score to your advisor by sending a message. Include the score
  and total points possible in the message body.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 5
        graded_fraction: 0.6
        target_assignment_status: "graded"
      outputs:
        - target_assignment_id
        - target_assignment_title
        - target_course_code
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
  targets:
    assignment_title: '{output.target_assignment_title}'
    course_code: '{output.target_course_code}'
    target_assignment_id: '{output.target_assignment_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent at least one message
    - expr: >-
        any(str(state.get_assignment('{target.target_assignment_id}').score) in m.get('body', '')
            for m in state.sent_messages)
      desc: Message body contains the correct score
  negative_checks:
    - expr: len(state.sent_messages) <= 2
      desc: Student did not send excessive messages
      penalty: 0.1
