task_id: lms_post_in_discussion
env_id: lms
title: Post in a Discussion Forum
instruction_template: >-
  Post a response in the discussion "{target.discussion_title}" for
  {target.course_code}. Your post should address the discussion prompt.
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
    - use: course_catalog
      params:
        count: 2
      outputs:
        - course_ids
        - course_codes
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: discussion_forums
      params:
        count: 3
        posts_per: 4
      outputs:
        - discussion_ids
        - target_discussion_id
        - target_discussion_title
        - target_course_code
  targets:
    discussion_title: '{output.target_discussion_title}'
    course_code: '{output.target_course_code}'
    target_discussion_id: '{output.target_discussion_id}'

eval:
  source: server_state
  checks:
    - expr: >-
        state.student_post_count('{target.target_discussion_id}') >= 1
      desc: Student posted at least once in the target discussion
    - expr: >-
        any(p.discussion_id == '{target.target_discussion_id}'
            and p.author_id == state.student.id
            and len(p.body.strip()) > 10
            for p in state.discussion_posts)
      desc: Post has meaningful content (more than 10 characters)
  negative_checks:
    - expr: >-
        not any(p.author_id == state.student.id
                and p.discussion_id != '{target.target_discussion_id}'
                for p in state.discussion_posts)
      desc: Student did not post in non-target discussions
      penalty: 0.2
