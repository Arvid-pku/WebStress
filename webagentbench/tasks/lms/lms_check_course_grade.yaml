task_id: lms_check_course_grade
env_id: lms
title: Check Overall Course Grade
instruction_template: >-
  Navigate to the grades page for {target.course_code} and report your overall
  weighted grade to your advisor by sending a message.
difficulty: easy
time_limit_seconds: 120
expected_steps: 5
primary_primitives:
  - grounding
start_path: /courses

seed:
  distractors: 0
  steps:
    - use: student_profile
      params: {}
      outputs:
        - student_id
        - advisor_name
    - use: course_catalog
      params:
        count: 3
      outputs:
        - course_ids
        - course_code
        - target_course_id
    - use: enrollment_set
      params: {}
      outputs:
        - enrollment_ids
    - use: assignment_battery
      params:
        per_course_count: 6
        graded_fraction: 0.5
      outputs:
        - assignment_ids
    - use: grade_book
      params: {}
      outputs:
        - grade_ids
        - current_weighted_scores
  targets:
    course_code: '{output.course_code}'
    target_course_id: '{output.target_course_id}'

eval:
  source: server_state
  checks:
    - expr: len(state.sent_messages) >= 1
      desc: Student sent at least one message
    - expr: >-
        state.weighted_score_for_course('{target.target_course_id}') is None or
        any(str(state.weighted_score_for_course('{target.target_course_id}')) in m.get('body', '')
            for m in state.sent_messages)
      desc: Message body contains the weighted grade (within rounding)
  negative_checks:
    - expr: len(state.sent_messages) <= 2
      desc: Student did not send excessive messages
      penalty: 0.1
