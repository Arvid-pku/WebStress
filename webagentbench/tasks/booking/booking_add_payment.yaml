task_id: booking_add_payment
env_id: booking
title: Add a Discover Card
instruction_template: 'Go to settings and add a new Discover card with the last four
  digits "7777", expiry "09/28", and holder name "Jordan Parker".

  '
difficulty: easy
time_limit_seconds: 120
expected_steps: 6
primary_primitives:
- backtracking
start_path: /settings
seed:
  distractors: 3
  actors: {}
  steps: []
  targets: {}
eval:
  source: server_state
  checks:
  - expr: "any(\n  pm.card_type == 'Discover' and pm.last_four == '7777'\n  for pm\
      \ in state.payment_methods\n)\n"
    desc: A Discover card ending in 7777 has been added
  - expr: "any(\n  pm.card_type == 'Discover' and pm.last_four == '7777' and pm.expiry\
      \ == '09/28'\n  for pm in state.payment_methods\n)\n"
    desc: The new card has the correct expiry date
  - expr: "any(\n  pm.card_type == 'Discover' and pm.last_four == '7777' and pm.holder_name\
      \ == 'Jordan Parker'\n  for pm in state.payment_methods\n)\n"
    desc: The new card has the correct holder name
  negative_checks:
  - expr: "not any(\n  e.action == 'payment_method.delete'\n  for e in state.audit_log\n\
      )\n"
    desc: No existing payment method was removed
    penalty: 0.2
secondary_primitives: []
