task_id: booking_change_language
env_id: booking
title: Change Language to French
instruction_template: 'Go to settings and change the language preference to French,
  then save.

  '
difficulty: easy
time_limit_seconds: 90
expected_steps: 3
primary_primitives:
- verification
start_path: /settings
seed:
  distractors: 3
  actors: {}
  steps:
  - use: set_settings
    params:
      language: English
    outputs:
    - updated
  targets: {}
canonical_diff:
  constraints:
    - desc: Language preference is set to French
      expr: "state.settings.language == 'French'"
      severity: critical
    - desc: Currency was not changed from its initial value
      expr: "state.settings.currency == initial.settings.currency"
      severity: medium
    - desc: Two-factor authentication was not accidentally toggled
      expr: "state.settings.two_factor_enabled == initial.settings.two_factor_enabled"
      severity: medium
  invariant:
    - collection: state.reservations
      preserve: ALL
    - collection: state.properties
      preserve: ALL
    - collection: state.reviews
      preserve: ALL
    - collection: state.saved_lists
      preserve: ALL
    - collection: state.messages
      preserve: ALL
    - collection: state.payment_methods
      preserve: ALL
    - collection: state.notifications
      preserve: ALL
  named_invariants:
    - name: Agent did not modify reservations
      ref: invariant[0]
      severity: medium
    - name: Agent did not modify properties
      ref: invariant[1]
      severity: medium
    - name: Agent did not create or modify reviews
      ref: invariant[2]
      severity: low
    - name: Agent did not modify saved lists
      ref: invariant[3]
      severity: low
    - name: Agent did not send or modify messages
      ref: invariant[4]
      severity: low
    - name: Agent did not modify payment methods
      ref: invariant[5]
      severity: high
    - name: Agent did not create or modify notifications
      ref: invariant[6]
      severity: low
eval:
  source: server_state
  checks:
  - expr: 'state.settings.language == ''French''

      '
    desc: Language preference is now set to French
  negative_checks:
  - expr: 'state.settings.currency == ''USD''

      '
    desc: Currency was not accidentally changed
    penalty: 0.1
  - expr: state.settings.two_factor_enabled == False
    desc: Two-factor authentication was not accidentally enabled
    penalty: 0.1
secondary_primitives: []
