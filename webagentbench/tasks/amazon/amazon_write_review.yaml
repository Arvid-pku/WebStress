task_id: amazon_write_review
env_id: amazon
title: Write a 5-Star Product Review
instruction_template: 'Find the product "{target.product_name}" and write a 5-star
  review with the title "Absolutely love it" and a body describing how much you enjoy
  using the product.

  '
difficulty: easy
time_limit_seconds: 180
expected_steps: 10
primary_primitives:
- grounding
start_path: /
seed:
  distractors: 7
  actors: {}
  steps:
  - use: product_with_reviews
    params:
      product_name: Bamboo Cutting Board Set
      category: Home & Kitchen
      price: 29.99
      reviews:
      - rating: 4
        title: Solid quality
        body: These cutting boards are well made and look great in the kitchen.
      - rating: 3
        title: Best boards I have owned
        body: The bamboo is thick and durable. Highly recommend.
    outputs:
    - product_id
    - review_ids
  targets:
    product_name: Bamboo Cutting Board Set
    product_id: '{output.product_id}'
eval:
  source: server_state
  checks:
  - expr: 'any(r.product_id == ''{target.product_id}'' and r.rating == 5 and ''Absolutely
      love it'' in r.title for r in state.reviews)

      '
    desc: A 5-star review with the title "Absolutely love it" exists for the target
      product
  - expr: any(r.product_id == '{target.product_id}' and len(r.body) > 10 for r in
      state.reviews if not r.id.startswith('review_initial_'))
    desc: Review has a meaningful body
  negative_checks:
  - expr: sum(1 for r in state.reviews if r.product_id == '{target.product_id}' and
      r.author_name == state.owner_name) <= 1
    desc: Only one review written by the user
    penalty: 0.2
secondary_primitives: []
