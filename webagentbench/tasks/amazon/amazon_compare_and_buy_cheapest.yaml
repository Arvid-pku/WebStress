task_id: amazon_compare_and_buy_cheapest
env_id: amazon
title: Compare Products and Buy the Cheapest Option
instruction_template: >
  Search for "{target.search_query}" products, compare the available options, and
  purchase the cheapest one that has a rating of at least 4.0 stars. Use the
  shipping address for Jordan Parker at 742 Evergreen Terrace and the Visa card ending in 4242.
difficulty: hard
time_limit_seconds: 360
expected_steps: 30
primary_primitives:
- planning
- state_tracking
- verification
start_path: /
seed:
  distractors: 10
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Basic Bluetooth Speaker
      brand: AmazonBasics
      category: Electronics
      price: 12.99
      rating: 4.2
      review_count: 1850
      features:
      - Portable design
      - 8-hour battery
      - Bluetooth 5.0
      variants: []
      in_stock: true
    outputs:
    - product_id
    - product_name
    - product_price
  targets:
    search_query: bluetooth speaker
    cheapest_product_id: '{output.product_id}'
    cheapest_product_name: '{output.product_name}'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: A new order was placed
  - expr: >
      any(any(item.product_id == '{target.cheapest_product_id}' for item in order.items)
      for order in state.orders if not order.id.startswith('order_initial_'))
    desc: Purchased the cheapest eligible product
  - expr: any(order.status == 'confirmed' and any(item.product_id == '{target.cheapest_product_id}' for item in order.items) for order in state.orders if not order.id.startswith('order_initial_'))
    desc: Order containing the target product is confirmed
  negative_checks:
  - expr: sum(1 for o in state.orders if not o.id.startswith('order_initial_')) <= 1
    desc: Only one new order placed
    penalty: 0.2
  - expr: >
      all(any(item.product_id == '{target.cheapest_product_id}' for item in order.items)
      for order in state.orders if not order.id.startswith('order_initial_'))
    desc: Did not buy a more expensive product instead of the cheapest
    penalty: 0.3
  - expr: len(state.cart_items) == 0
    desc: Cart is empty after checkout
    penalty: 0.1
