task_id: amazon_competitor_switchover
env_id: amazon
title: Compare Products and Buy the Superior Competitor
instruction_template: >
  Search for '{target.ref_name}' and examine its details (price and rating).
  Then browse for similar products in the same category and subcategory. If
  you find a product with a higher rating AND a lower price than
  '{target.ref_name}', buy that superior product instead. If no product beats
  it on both criteria, buy '{target.ref_name}'.
difficulty: expert
time_limit_seconds: 420
expected_steps: 35
primary_primitives:
- grounding
- exploration
- verification
- planning
secondary_primitives:
- state_tracking
start_path: /
seed:
  distractors: 20
  actors: {}
  steps:
  - use: featured_product
    params:
      name: Pro Wireless Mouse
      brand: Wavefront
      category: Electronics
      price: 45.99
      rating: 4.2
      features:
      - Ergonomic design
      - 2.4GHz wireless
      - 6 programmable buttons
      variants: []
      in_stock: true
    outputs:
    - product_id_ref
    - product_name_ref
    - product_price_ref
  - use: featured_product
    params:
      name: Elite Wireless Mouse
      brand: TechNova
      category: Electronics
      subcategory: Mice
      price: 38.99
      rating: 4.8
      features:
      - Ultra-precise sensor
      - Silent click buttons
      - USB-C rechargeable
      - RGB lighting
      variants: []
      in_stock: true
    outputs:
    - product_id_best
    - product_name_best
    - product_price_best
  - use: competitor_products
    params:
      reference_product_id: '{output.product_id_ref}'
      count: 3
      price_variance: 0.15
    outputs:
    - competitor_ids
  - use: product_catalog
    params:
      category: Electronics
      count: 10
      price_range:
      - 20.0
      - 80.0
    outputs:
    - catalog_electronics
  targets:
    ref_name: '{output.product_name_ref}'
    ref_pid: '{output.product_id_ref}'
    best_name: '{output.product_name_best}'
    best_pid: '{output.product_id_best}'
eval:
  source: server_state
  checks:
  - expr: any(not o.id.startswith('order_initial_') for o in state.orders)
    desc: An order was placed
  - expr: >
      any(any(item.product_id == '{target.best_pid}' for item in o.items)
      for o in state.orders if not o.id.startswith('order_initial_'))
    desc: The superior competitor was purchased
  - expr: >
      any(o.status == 'confirmed' for o in state.orders
      if not o.id.startswith('order_initial_'))
    desc: Order confirmed
  - expr: len(state.cart_items) == 0
    desc: Cart empty after checkout
  - expr: >
      '{target.ref_pid}' in [p for p in state.recently_viewed]
      or len(state.search_history) > 0
    desc: Agent searched or viewed the reference product
  negative_checks:
  - expr: >
      not any(any(item.product_id == '{target.ref_pid}' for item in o.items)
      for o in state.orders if not o.id.startswith('order_initial_'))
    desc: Reference product was NOT purchased (competitor is better)
    penalty: 0.25
  - expr: >
      sum(1 for o in state.orders if not o.id.startswith('order_initial_')) <= 1
    desc: Only one order placed
    penalty: 0.1
