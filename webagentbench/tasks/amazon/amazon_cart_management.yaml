task_id: amazon_cart_management
env_id: amazon
title: Manage Shopping Cart Items
instruction_template: 'Your cart has several items. Remove the item "{target.remove_product}"
  from the cart, change the quantity of "{target.update_product}" to {target.new_quantity},
  and then verify the cart total is correct.

  '
difficulty: medium
time_limit_seconds: 240
expected_steps: 15
primary_primitives:
- state_tracking
start_path: /cart
seed:
  distractors: 5
  actors: {}
  steps:
  - use: checkout_ready
    params:
      items:
      - name: Laptop Stand
        price: 49.99
        quantity: 1
      - name: Wireless Keyboard
        price: 79.99
        quantity: 2
      - name: Desk Lamp
        price: 34.99
        quantity: 1
    outputs:
    - cart_item_ids
    - address_id
    - payment_id
    - expected_total
  targets:
    remove_product: Desk Lamp
    update_product: Wireless Keyboard
    new_quantity: '3'
eval:
  source: server_state
  checks:
  - expr: not any(item.product_name == 'Desk Lamp' for item in state.cart_items)
    desc: Desk Lamp removed from cart
  - expr: any(item.product_name == 'Wireless Keyboard' and item.quantity == 3 for
      item in state.cart_items)
    desc: Wireless Keyboard quantity updated to 3
  - expr: any(item.product_name == 'Laptop Stand' for item in state.cart_items)
    desc: Laptop Stand still in cart
  negative_checks:
  - expr: not any(item.product_name == 'Laptop Stand' and item.quantity != 1 for item
      in state.cart_items)
    desc: Laptop Stand quantity was not accidentally changed
    penalty: 0.15
  - expr: len(state.cart_items) == 2
    desc: Exactly 2 items remain in cart after removal
    penalty: 0.1
secondary_primitives: []
