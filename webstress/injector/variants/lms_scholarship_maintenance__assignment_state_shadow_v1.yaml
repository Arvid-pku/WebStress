variant_id: lms_scholarship_maintenance__assignment_state_shadow_v1
base_task_id: lms_scholarship_maintenance
target_primitive: state_tracking
description: Additional LMS shadows split relevant state across similar entities.
  The agent must track the right object throughout the workflow.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: assignment
      title: Weekly submission practice copy
      assignment_type: homework
      submission_status: not_submitted
    - type: assignment
      title: Weekly submission archived version
      assignment_type: homework
      submission_status: graded
      score: '88'
      feedback: This is an older graded copy.
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/courses/*/assignments'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
