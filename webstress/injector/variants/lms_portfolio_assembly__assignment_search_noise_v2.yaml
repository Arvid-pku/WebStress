variant_id: lms_portfolio_assembly__assignment_search_noise_v2
base_task_id: lms_portfolio_assembly
target_primitive: exploration
description: Search-space noise and a later LMS correction spread the clue trail across
  surfaces. The agent must continue exploring until the real target is confirmed.
injections:
- layer: server
  params:
    action: add_lms_correction_notice
    seed: 42
    title: 'Correction: use the latest LMS update'
    body: 'Correction: the earlier LMS view was incomplete. Use the latest course
      state before you finish.'
    priority: normal
    type: announcement
- layer: network
  params:
    action: stale_data
    url_pattern: '**/api/env/lms/courses/*/assignments'
    stale_body:
      items: []
    stale_count: 1
    behavior:
      mode: once
