variant_id: lms_resubmit_after_feedback__assignment_ordering_shift_v1
base_task_id: lms_resubmit_after_feedback
target_primitive: planning
description: Ordering cues are perturbed and the first snapshot can be incomplete,
  so the agent must re-plan against the current LMS state.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: assignment
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: Weekly submission practice copy
      assignment_type: homework
      submission_status: not_submitted
    - type: assignment
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: Weekly submission archived version
      assignment_type: homework
      submission_status: graded
      score: '88'
      feedback: This is an older graded copy.
- layer: server
  params:
    action: scramble_timestamps
    seed: 42
