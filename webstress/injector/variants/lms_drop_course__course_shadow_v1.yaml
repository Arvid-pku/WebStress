variant_id: lms_drop_course__course_shadow_v1
base_task_id: lms_drop_course
target_primitive: grounding
description: Lookalike course records sit near the target, so the agent must match
  the exact LMS entity before acting.
injections:
- layer: seed
  params:
    action: add_confusing_decoys
    decoys:
    - type: course
      course_code: '{target.course_code}-ALT'
      title: '{target.course_code} Alternate Section'
      status: enrolled
    - type: announcement
      course_id: '{target.target_course_id}'
      course_code: '{target.course_code}'
      title: '{target.course_code} registration note'
      body: Archived enrollment reminder for a similar course code.
      priority: normal
