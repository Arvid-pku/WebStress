task_id: lms_scholarship_maintenance
env_id: lms
title: Scholarship Maintenance Plan
instruction_template: 'Your scholarship requires maintaining a 3.5 GPA. Your current
  GPA is {target.gpa}. Review all 5 enrolled courses and determine the optimal grade
  distribution to maintain your scholarship. For each course: (1) Check your current
  weighted score. (2) Determine the minimum letter grade needed. (3) Compute required
  scores on remaining assignments. (4) Identify courses where achieving the needed
  grade is most/least feasible based on remaining assignment weight and current standing.
  Pick the single most impactful missing assignment and submit it with file "scholarship_save.pdf"
  to secure those points. Then send a brief maintenance plan to your advisor
  ({target.advisor_name}).'
difficulty: frontier
time_limit_seconds: 600
expected_steps: 40
primary_primitives:
- state_tracking
start_path: /dashboard
seed:
  distractors: 2
  steps:
  - use: student_profile
    params:
      gpa: '3.45'
    outputs:
    - student_id
    - advisor_name
    - gpa
  - use: course_catalog
    params:
      count: 5
      must_include:
      - CS101
      - MATH201
      - ENG102
      - PHYS201
      - STAT301
      vary_late_policies: true
    outputs:
    - course_ids
    - course_codes
  - use: enrollment_set
    params: {}
    outputs:
    - enrollment_ids
  - use: assignment_battery
    params:
      per_course_count: 7
      graded_fraction: 0.5
      missing_count: 1
    outputs:
    - assignment_ids
    - missing_assignment_ids
  - use: grade_book
    params: {}
    outputs:
    - grade_ids
    - current_weighted_scores
  targets:
    advisor_name: '{output.advisor_name}'
    gpa: '{output.gpa}'
    course_ids: '{output.course_ids}'
    course_codes: '{output.course_codes}'
    current_weighted_scores: '{output.current_weighted_scores}'
    missing_assignment_ids: '{output.missing_assignment_ids}'
canonical_diff:
  update:
  - entity: Assignment
    desc: Submit the identified scholarship-saving assignment with scholarship_save.pdf
    where:
      id:
        expr: "x == target['missing_assignment_ids'].split(',')[0].strip()"
    changes:
      submission_status:
        in:
        - submitted
        - late
      file_name:
        eq: scholarship_save.pdf
      attempt_count:
        expr: "x >= initial.get_assignment(target['missing_assignment_ids'].split(',')[0].strip()).attempt_count + 1"
      submitted_at:
        expr: "x is not None"
  invariant:
  - collection: state.assignments
    filter: "a.id != target['missing_assignment_ids'].split(',')[0].strip()"
    preserve: ALL
  - collection: state.courses
    preserve: ALL
  - collection: state.enrollments
    preserve: ALL
  - collection: state.modules
    preserve: ALL
  - collection: state.discussions
    preserve: ALL
  - collection: state.discussion_posts
    preserve: ALL
  - collection: state.peer_reviews
    preserve: ALL
  - collection: state.announcements
    preserve: ALL
  - collection: state.grades
    preserve: ALL
  - collection: state.calendar_events
    preserve: ALL
  - collection: state.student
    preserve: ALL
  constraints:
  - desc: Agent sent a maintenance plan to the advisor
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and (m.get('subject', '') or '').strip() and (m.get('body', '') or '').strip() for m in state.sent_messages)"
    severity: critical
  - desc: Advisor message came from the student account
    expr: "any(target['advisor_name'] in (m.get('to', '') or '') and m.get('from') == state.student.email for m in state.sent_messages)"
    severity: high
  - desc: Agent did not send excessive messages
    expr: "len(state.sent_messages) <= 4"
    severity: medium
  named_invariants:
  - name: Agent submitted the scholarship-saving assignment
    ref: update[0]
    severity: high
  - name: Agent did not modify other assignments
    ref: invariant[0]
    severity: high
  - name: Agent did not modify course records
    ref: invariant[1]
    severity: medium
  - name: Agent did not drop or alter enrollments
    ref: invariant[2]
    severity: high
  - name: Agent did not modify modules
    ref: invariant[3]
    severity: medium
  - name: Agent did not modify discussions
    ref: invariant[4]
    severity: medium
  - name: Agent did not create or edit discussion posts
    ref: invariant[5]
    severity: medium
  - name: Agent did not alter peer reviews
    ref: invariant[6]
    severity: medium
  - name: Agent did not modify announcements
    ref: invariant[7]
    severity: medium
  - name: Agent did not modify grades
    ref: invariant[8]
    severity: high
  - name: Agent did not modify calendar events
    ref: invariant[9]
    severity: low
secondary_primitives: []
